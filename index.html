const STORAGE_KEY = "arcane_v3";
const defaultData = {
  points: 0, uploads: [], purchased: [], currentTitle: null,
  drawings: [], posts: [], todayDrawPts: 0, lastDrawDate: null,
  lastCheckIn: null, loginCount: 0, joinDate: null,
  customName: null, isFirstLogin: true,
};

function loadData(role) {
  try {
    const raw = localStorage.getItem(STORAGE_KEY + "_" + role);
    if (raw) {
      const d = JSON.parse(raw);
      const today = new Date().toDateString();
      if (d.lastDrawDate !== today) { d.todayDrawPts = 0; d.lastDrawDate = today; }
      return { ...defaultData, ...d };
    }
  } catch(e) {}
  return { ...defaultData, joinDate: new Date().toLocaleDateString('zh-TW'), lastDrawDate: new Date().toDateString() };
}

function saveData(role, data) {
  try { localStorage.setItem(STORAGE_KEY + "_" + role, JSON.stringify(data)); } catch(e) {}
}

function getAutoTitles(data) {
  const n = data.uploads.filter(u => u.type==="place" && u.verifiedSuccess).length;
  const out = [];
  if(n>=10)  out.push({id:"auto_1",name:"探靈者",  icon:"👁️",desc:"已驗證探靈成功 10 次",type:"title"});
  if(n>=50)  out.push({id:"auto_2",name:"尋靈者",  icon:"🕯️",desc:"已驗證探靈成功 50 次",type:"title"});
  if(n>=100) out.push({id:"auto_3",name:"靈界行者",icon:"🌀",desc:"已驗證探靈成功 100 次",type:"title"});
  return out;
}

function checkReq(req, data) {
  if (!req) return { ok:true, msg:"" };
  if (req.type==="hasItems") {
    const ok = req.items.every(id => data.purchased.includes(id));
    return { ok, msg: ok ? "" : "需先購買金木水雷四象內練術" };
  }
  if (req.type==="magicUse") {
    const count = data.uploads.filter(u=>u.subType===req.target).length;
    return { ok: count>=req.count, msg:`需施展「${req.target}」${req.count}次（目前：${count}次）` };
  }
  if (req.type==="drawUse") {
    const count = data.drawings.filter(d=>d.subType===req.target).length;
    return { ok: count>=req.count, msg:`需繪製「${req.target}」${req.count}次（目前：${count}次）` };
  }
  return { ok:true, msg:"" };
}

function divineCalc(name, q, seed) {
  const c = name+"夏娃"+q+seed; let h=0;
  for(let i=0;i<c.length;i++){h=((h<<5)-h)+c.charCodeAt(i);h=h&h;}
  const a=Math.abs(h), p1=(a%40)+35, p2=((a>>8)%35)+20;
  return {p1,p2,p3:100-p1-p2};
}
