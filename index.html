function loadData(role) {
  try {
    const raw = localStorage.getItem(STORAGE_KEY + "_" + role);
    if (raw) {
      const d = JSON.parse(raw);
      const today = new Date().toDateString();
      if (d.lastDrawDate !== today) { d.todayDrawPts = 0; d.lastDrawDate = today; }
      if (d.lastUploadDate !== today) {
        d.dailyUploads = { magic: 0, creature: 0, place: 0 };
        d.lastUploadDate = today;
      }
      return { ...defaultData, ...d };
    }
  } catch(e) {}
  return { ...defaultData, joinDate: new Date().toLocaleDateString('zh-TW'), lastDrawDate: new Date().toDateString(), lastUploadDate: new Date().toDateString() };
}

function saveData(role, data) {
  try { localStorage.setItem(STORAGE_KEY + "_" + role, JSON.stringify(data)); } catch(e) {}
}

function checkReq(req, data) {
  if (!req) return { ok:true, msg:"" };
  if (req.type==="hasItems") {
    const ok = req.items.every(id => data.purchased.includes(id));
    return { ok, msg: ok ? "" : "需先購買金木水雷四象內練術" };
  }
  if (req.type==="magicUse") {
    const count = data.uploads.filter(u=>u.subType===req.target).length;
    return { ok: count>=req.count, msg:`需施展「${req.target}」${req.count}次（目前：${count}次）` };

  return { ok:true, msg:"" };
}

// ── 月相計算 ──
function getMoonPhase() {
  const known = new Date(2000, 0, 6, 18, 14); // 已知新月
  const diff = (Date.now() - known.getTime()) / (1000*60*60*24);
  const phase = ((diff % 29.53) + 29.53) % 29.53;
  if (phase < 1.85)  return { name:"新月",  symbol:"🌑", energy:"起始", modifier:1.1 };
  if (phase < 7.38)  return { name:"眉月",  symbol:"🌒", energy:"成長", modifier:0.95 };
  if (phase < 9.22)  return { name:"上弦月",symbol:"🌓", energy:"行動", modifier:1.0 };
  if (phase < 14.77) return { name:"盈凸月",symbol:"🌔", energy:"積累", modifier:1.05 };
  if (phase < 16.61) return { name:"滿月",  symbol:"🌕", energy:"巔峰", modifier:1.3 };
  if (phase < 22.15) return { name:"虧凸月",symbol:"🌖", energy:"釋放", modifier:1.0 };
  if (phase < 23.99) return { name:"下弦月",symbol:"🌗", energy:"回歸", modifier:0.9 };
  return                     { name:"殘月",  symbol:"🌘", energy:"沉澱", modifier:0.85 };
}

// ── 時辰計算 ──
function getTimeEnergy() {
  const h = new Date().getHours();
  if (h >= 23 || h < 1)  return { name:"子時", desc:"陰陽交替，靈力最盛", modifier:1.3 };
  if (h >= 1  && h < 3)  return { name:"丑時", desc:"靈界通道開啟",       modifier:1.2 };
  if (h >= 3  && h < 5)  return { name:"寅時", desc:"幽冥氣息濃厚",       modifier:1.15 };
  if (h >= 5  && h < 7)  return { name:"卯時", desc:"天光初現，靈力平穩", modifier:0.9 };
  if (h >= 7  && h < 9)  return { name:"辰時", desc:"陽氣上升",           modifier:0.8 };
  if (h >= 9  && h < 11) return { name:"巳時", desc:"陽氣旺盛，靈力較弱", modifier:0.7 };
  if (h >= 11 && h < 13) return { name:"午時", desc:"陽極，靈力最弱",     modifier:0.6 };
  if (h >= 13 && h < 15) return { name:"未時", desc:"陽氣漸收",           modifier:0.75 };
  if (h >= 15 && h < 17) return { name:"申時", desc:"靈力緩緩回升",       modifier:0.85 };
  if (h >= 17 && h < 19) return { name:"酉時", desc:"黃昏靈力甦醒",       modifier:1.0 };
  if (h >= 19 && h < 21) return { name:"戌時", desc:"靈體活躍時分",       modifier:1.1 };
  return                         { name:"亥時", desc:"靈界完全甦醒",       modifier:1.2 };
}

function divineCalc(name, q, seed) {
  const moon = getMoonPhase();
  const time = getTimeEnergy();
  // 月相+時辰納入計算
  const c = name+"夏娃"+q+seed+moon.name+time.name; let h=0;
  for(let i=0;i<c.length;i++){h=((h<<5)-h)+c.charCodeAt(i);h=h&h;}
  const a=Math.abs(h);
  // 月相修正係數影響成功率
  let p1 = Math.round(((a%40)+30) * moon.modifier * time.modifier);
  p1 = Math.min(Math.max(p1, 15), 80); // 限制在 15~80 之間
  const p2 = Math.round(((a>>8)%35)+15);
  const p3 = 100-p1-Math.min(p2, 100-p1-5);
  return {p1, p2:Math.min(p2,100-p1-5), p3:Math.max(p3,5), moon, time};
}

// ── AI 神諭生成 ──
async function generateOracle(name, question, p1, moon, time, type, subType, location) {
  const typeMap = { magic:"施展魔法", creature:"探查神秘生物", place:"探尋靈異地點" };
  const locStr = location ? `
地點：${location}` : "";
  const prompt = `你是精通 Anzariyah 占卜術的靈界使者，語氣神秘、詩意。

占卜者：${name}（母親：夏娃）
當前月相：${moon.symbol} ${moon.name}（${moon.energy}）
時辰：${time.name}（${time.desc}）
事項：${typeMap[type]}${subType ? "——" + subType : ""}${locStr}
靈界回應強度：${p1}%

請生成一段 40-60 字的中文神諭，直接回應此次占卜。
要求：神秘詩意、有靈性感、結合月相、時辰${location?"、地點":""}的能量。
${location ? "神諭中可隱喻地提及該地點的靈力特質。" : ""}
只輸出神諭本體，不要標題或解釋。`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 200,
        messages: [{ role: "user", content: prompt }]
      })
    });
    const data = await res.json();
    return data.content?.[0]?.text || null;
  } catch(e) {
    return null;
  }
}

  });
  const [firstName,setFirstName] = useState("");

  const showNotif = m => { setNotif(m); setTimeout(()=>setNotif(null),2500); };

  const updateData = updater => {
    setData(prev => {
      const next = typeof updater==="function" ? updater(prev) : {...prev,...updater};
      if(role) saveData(role,next);
      return next;
    });
  };

  const login = () => {
    if(!u.trim()||!p.trim()){showNotif("請輸入帳號和密碼");return;}
    let r=null;
    if(u==="管理員"&&p==="武者") r="admin";
    else if(u==="@@"&&p==="##") r="user";
    else{showNotif("帳號或密碼錯誤");return;}
    setRole(r);
    const d=loadData(r);
    d.loginCount=(d.loginCount||0)+1;
    setData(d); saveData(r,d);
    // 儲存登入狀態，下次自動登入
    try { localStorage.setItem("arcane_session", r); } catch(e) {}
    if(!d.customName) setNameModal(true);
    setStage("main"); setU(""); setP("");
  };

  const confirmName = () => {
    if(!firstName.trim()){showNotif("請輸入術士名號");return;}
    if(firstName.trim().length>12){showNotif("名號不能超過12字");return;}
    updateData(prev=>({...prev,customName:firstName.trim(),isFirstLogin:false}));
    setNameModal(false); setFirstName("");
    showNotif("歡迎，"+firstName.trim()+"！");
  };

  const logout = () => {
    try { localStorage.removeItem("arcane_session"); } catch(e) {}
    setStage("login"); setRole(null); setData(defaultData); setTab("upload");
  };

  return (
    <div style={{background:"#080810",minHeight:"100vh",overflow:"hidden",position:"relative"}}>
      <style>{CSS}</style>
      <div style={{position:"fixed",inset:0,pointerEvents:"none",overflow:"hidden"}}>
        {STARS.map(s=><div key={s.id} style={{position:"absolute",borderRadius:"50%",width:s.big?"2px":"1px",height:s.big?"2px":"1px",background:s.color,left:`${s.left}%`,top:`${s.top}%`,animation:`starBlink ${s.duration}s ease-in-out infinite`,animationDelay:`${s.delay}s`}}/>)}
      </div>
      <div style={{position:"fixed",inset:0,pointerEvents:"none",overflow:"hidden"}}>
        {PARTICLES.map(pt=><div key={pt.id} className="particle" style={{left:`${pt.left}%`,bottom:0,width:`${pt.size}px`,height:`${pt.size}px`,animationDuration:`${pt.duration}s`,animationDelay:`${pt.delay}s`}}/>)}
      </div>
      {notif&&<div className="notif">{notif}</div>}
      {stage==="login" && <Login u={u} setU={setU} p={p} setP={setP} onLogin={login}/>}
      {stage==="main"  && <Main tab={tab} setTab={setTab} showNotif={showNotif} role={role} data={data} updateData={updateData} onLogout={logout}/>}
      {nameModal && (
        <div className="modal-overlay">
          <div className="modal-box fade-up">
            <div style={{fontSize:50,marginBottom:12}}>🔮</div>
            <h3 style={{fontSize:17,color:"#a78bfa",marginBottom:8}}>歡迎來到玄秘紀元</h3>
            <p style={{color:"rgba(226,232,240,.6)",fontSize:12,marginBottom:16,lineHeight:1.7}}>請為自己取一個術士名號<br/>日後可在個人檔案中更改</p>
            <input type="text" placeholder="輸入術士名號（最多12字）" value={firstName} onChange={e=>setFirstName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&confirmName()} maxLength={12} style={{marginBottom:14}} autoFocus/>
            <button className="mbtn" onClick={confirmName}>確認名號，開始冒險</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════
//  上傳 Tab
// ═══════════════════════════════
function Upload({showNotif,data,updateData}){
  const [sel,setSel]=useState(null);
  const [magic,setMagic]=useState("白魔法");
  const [locationName,setLocationName]=useState("");
  const [preview,setPreview]=useState(null);
  const [result,setResult]=useState(null);
  const [uploading,setUploading]=useState(false);
  const [note,setNote]=useState("");
  const galleryRef=useRef(null);
  const cameraRef=useRef(null);

  const DAILY_LIMITS = { magic: 3, creature: 2, place: 1 };
  const todayUploads = data.dailyUploads || { magic: 0, creature: 0, place: 0 };

  const cats=[
    {id:"magic",  icon:"🧙",label:"魔法道法",desc:"施法・符陣・儀式",c:"#8b5cf6",r:"139,92,246",pts:10},
    {id:"creature",icon:"🐉",label:"神秘生物",desc:"奇異生物・靈異",  c:"#10b981",r:"16,185,129",pts:15},
    {id:"place",  icon:"🌙",label:"神秘地點",desc:"廟宇・秘境・靈地",c:"#3b82f6",r:"59,130,246",pts:20},
  ];
  const magicTypes=["白魔法","黑魔法","自然魔法","古老的紗草紙魔法","一般魔法"];

  const handleFile=e=>{
    const f=e.target.files[0]; if(!f) return;
    if(f.size>10*1024*1024){showNotif("圖片過大，請選10MB以內的圖片");return;}
    const r=new FileReader();
    r.onload=ev=>setPreview(ev.target.result);
    r.readAsDataURL(f);
    e.target.value="";
  };

  const submit=()=>{
    if(!sel){showNotif("請先選擇探險類型");return;}
    if(!preview){showNotif("請先選擇照片");return;}
    const used = todayUploads[sel] || 0;
    const limit = DAILY_LIMITS[sel];
    if(used >= limit){
      const nameMap={magic:"魔法道法",creature:"神秘生物",place:"神秘地點"};
      showNotif(`今日「${nameMap[sel]}」已達上限（${limit}次）`);return;
    }
    setUploading(true);
    const labelMap={magic:magic,creature:"靈體探查",place:"靈地探尋"};
    const qMap={magic:"魔法是否成功",creature:"是否拍到生物",place:"是否探到靈地"};
    setTimeout(()=>{
         const userName = data.customName || "術士";
      const loc = sel==="place" ? locationName : "";
      const {p1,p2,p3,moon,time}=divineCalc(userName, qMap[sel]+(loc?"+"+loc:""), Date.now().toString());
      const verified = sel==="place" && p1>=50;
      const newResult = {type:sel,label:labelMap[sel],verified,
        o1:{pct:p1,text:getOutcome(sel,1)},
        o2:{pct:p2,text:getOutcome(sel,2)},
        o3:{pct:p3,text:getOutcome(sel,3)},
        moon, time, locationName:loc||null, loading:true, oracle:null
      };
      setResult(newResult);
      generateOracle(userName, qMap[sel], p1, moon, time, sel, magic, loc).then(oracle => {
        setResult(prev => prev ? {...prev, oracle, loading:false} : prev);
      });
       const pts=sel==="place"?20:sel==="creature"?15:10;
       // 成功（p1>=50）才扣次數、才加點數
      const isSuccess = p1 >= 50;
      const earnPts = isSuccess ? pts : 0;
      updateData(prev=>({
        ...prev,
        uploads:[{id:Date.now(),type:sel,subType:sel==="magic"?magic:null,label:labelMap[sel],locationName:loc||null,preview,points:earnPts,note,verifiedSuccess:verified,isSuccess,time:new Date().toLocaleString("zh-TW"),timestamp:Date.now(),result:{p1,p2,p3}},...prev.uploads],
        points:prev.points+earnPts,
        dailyUploads:{...(prev.dailyUploads||{magic:0,creature:0,place:0}),[sel]:isSuccess?(prev.dailyUploads?.[sel]||0)+1:(prev.dailyUploads?.[sel]||0)},
        lastUploadDate:new Date().toDateString()
      }));
      if(isSuccess){
        showNotif(verified?"靈界驗證成功！+"+pts+" 點（已計入任務）":"靈界認可！+"+pts+" 點");
      } else {
        showNotif("靈界未回應，此次不計入次數，可重試");
      }
      setUploading(false);
    },2000);
  };

  const reset=()=>{setResult(null);setSel(null);setPreview(null);setNote("");setLocationName("");};

  return (
    <div className="tab-in">
      <h2 style={{fontFamily:"'Cinzel',serif",fontSize:17,letterSpacing:1,marginBottom:4}}>探險打卡</h2>
      <p style={{color:"rgba(226,232,240,.45)",fontSize:12,marginBottom:16}}>選擇類型，從相簿選取或直接拍照</p>
      {!result ? (<>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
          {cats.map(c=>(
            <div key={c.id} className={`cat-card ${sel===c.id?"sel":""}`} onClick={()=>setSel(c.id)} style={{borderColor:sel===c.id?c.c:undefined}}>
              <div style={{fontSize:24,marginBottom:4}}>{c.icon}</div>
              <div style={{color:sel===c.id?c.c:"rgba(226,232,240,.75)",fontFamily:"'Cinzel',serif",fontSize:11,fontWeight:600,marginBottom:2}}>{c.label}</div>
              <div style={{color:"rgba(226,232,240,.38)",fontSize:9,marginBottom:4}}>{c.desc}</div>
              <div style={{display:"flex",gap:4,justifyContent:"center",flexWrap:"wrap"}}>
                  <div style={{background:`rgba(${c.r},.18)`,borderRadius:100,padding:"2px 7px"}}>
                    <span style={{color:c.c,fontSize:9}}>+{c.pts}</span>
                  </div>
                  {(()=>{const used=(todayUploads[c.id]||0);const lim=DAILY_LIMITS[c.id];const left=lim-used;return(<div style={{background:left===0?"rgba(239,68,68,.18)":"rgba(52,211,153,.12)",borderRadius:100,padding:"2px 7px"}}><span style={{color:left===0?"#ef4444":"#34d399",fontSize:9}}>{left===0?"今日已滿":"剩"+left+"次"}</span></div>);})()}
                </div>
            </div>
          ))}
        </div>
        {sel==="magic" && (
          <div style={{marginBottom:12}}>
            <label style={{display:"block",color:"rgba(167,139,250,.8)",fontFamily:"'Cinzel',serif",fontSize:11,marginBottom:6}}>魔法分支</label>
            <select value={magic} onChange={e=>setMagic(e.target.value)}
          {sel==="place" && (
            <div style={{marginBottom:12}} className="fade-up">
              <label style={{display:"block",color:"rgba(167,139,250,.8)",fontFamily:"'Cinzel',serif",fontSize:11,marginBottom:6}}>
                📍 地點名稱（加入占卜計算）
              </label>
              <input
                type="text"
                placeholder="例：台北大龍峒、九份老街、廢棄醫院..."
                value={locationName}
                onChange={e=>setLocationName(e.target.value)}
                maxLength={30}
              />
            </div>
          )}
>
              {magicTypes.map(t=><option key={t} value={t}>{t}</option>)}
            </select>
          </div>
        )}
        {preview ? (
          <div style={{marginBottom:12}}>
            <img src={preview} alt="預覽" className="upload-preview" style={{marginBottom:10}}/>
            <button className="mbtn mbtn-cancel mbtn-sm" onClick={()=>{setPreview(null);}}>✕ 重新選擇照片</button>
          </div>
        ):(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
            <div className="up-zone" onClick={()=>galleryRef.current.click()}>
              <div style={{fontSize:30,marginBottom:6}}>🖼️</div>
              <p style={{color:"rgba(167,139,250,.7)",fontFamily:"'Cinzel',serif",fontSize:11}}>從相簿選擇</p>
              <input ref={galleryRef} type="file" accept="image/*" onChange={handleFile} style={{display:"none"}}/>
            </div>
            <div className="up-zone" onClick={()=>cameraRef.current.click()}>
              <div style={{fontSize:30,marginBottom:6}}>📷</div>
              <p style={{color:"rgba(167,139,250,.7)",fontFamily:"'Cinzel',serif",fontSize:11}}>拍照上傳</p>
              <input ref={cameraRef} type="file" accept="image/*" capture="environment" onChange={handleFile} style={{display:"none"}}/>
            </div>
          </div>
        )}
        {preview && (
          <div style={{marginBottom:12}}>
            <textarea placeholder="描述你的探險或儀式紀錄（選填）..." value={note} onChange={e=>setNote(e.target.value)} style={{minHeight:60}}/>
          </div>
        )}
        <button className="mbtn" onClick={submit} disabled={!sel||!preview||uploading}>
          {uploading?"⏳ 靈界通靈中...":"🔮 提交上傳"}
        </button>
      </>) : (
        <div className="fade-up">
          <img src={preview} alt="" className="upload-preview" style={{marginBottom:12}}/>
          <div style={{padding:12,background:"rgba(139,92,246,.08)",borderRadius:10,textAlign:"center",marginBottom:10}}>
            <p style={{fontFamily:"'Cinzel',serif",color:"#a78bfa",fontSize:11,marginBottom:4}}>靈界占卜結果</p>
            <p style={{color:"rgba(226,232,240,.7)",fontSize:12,marginBottom:6}}>{result.label} 之反饋</p>
            {result.moon && (
              <div style={{display:"flex",justifyContent:"center",gap:12,fontSize:11,color:"rgba(226,232,240,.5)",flexWrap:"wrap"}}>
                <span>{result.moon.symbol} {result.moon.name} · {result.moon.energy}</span>
                <span>⏰ {result.time.name}</span>
                {result.locationName && <span>📍 {result.locationName}</span>}
              </div>
            )}
          </div>
          {/* 成功/失敗大標示 */}
          <div style={{marginBottom:10,padding:12,borderRadius:12,textAlign:"center",
            background:result.o1.pct>=50?"rgba(52,211,153,.1)":"rgba(239,68,68,.1)",
            border:`1px solid ${result.o1.pct>=50?"#34d399":"#ef4444"}`}}>
            <p style={{fontSize:16,fontWeight:700,color:result.o1.pct>=50?"#34d399":"#ef4444"}}>
              {result.o1.pct>=50?"✅ 靈界認可 · 次數已計入":"❌ 靈界未回應 · 次數未消耗，可重試"}
            </p>
            {result.o1.pct<50 && <p style={{color:"rgba(226,232,240,.5)",fontSize:11,marginTop:4}}>換個時辰或等待更好的靈力環境</p>}
          </div>
          {/* AI 神諭區塊 */}
          <div style={{marginBottom:10,padding:14,background:"linear-gradient(135deg,rgba(139,92,246,.12),rgba(6,182,212,.08))",borderRadius:12,border:"1px solid rgba(139,92,246,.3)"}}>
            <p style={{fontFamily:"'Cinzel',serif",color:"#a78bfa",fontSize:11,letterSpacing:1,marginBottom:8,textAlign:"center"}}>✦ 靈界神諭 ✦</p>
            {result.loading ? (
              <p style={{color:"rgba(226,232,240,.5)",fontSize:12,textAlign:"center",lineHeight:1.8}}>⏳ 靈界通靈中...</p>
            ) : result.oracle ? (
              <p style={{color:"#e2e8f0",fontSize:13,lineHeight:1.9,textAlign:"center",fontStyle:"italic"}}>{result.oracle}</p>
            ) : (
              <p style={{color:"rgba(226,232,240,.5)",fontSize:11,textAlign:"center"}}>靈界暫時沉默</p>
            )}
          </div>
          {result.type==="place" && (
            <div style={{marginBottom:10,padding:10,borderRadius:10,textAlign:"center",
              background:result.verified?"rgba(52,211,153,.1)":"rgba(239,68,68,.1)",
              border:`1px solid ${result.verified?"#34d399":"#ef4444"}`}}>
              <p style={{fontSize:12,fontWeight:700,color:result.verified?"#34d399":"#ef4444"}}>
                {result.verified?"✅ 靈界驗證：探靈成功！（已計入稱號任務進度）":"❌ 靈界驗證：成功能量不足（不計入進度）"}
              </p>
            </div>
          )}
          {[result.o1,result.o2,result.o3].map((o,i)=>(
            <div key={i} className="oracle-box">
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span style={{fontFamily:"'Cinzel',serif",fontSize:11,color:"#a78bfa"}}>可能性 {i+1}</span>
                <span style={{color:"#22d3ee",fontWeight:700,fontSize:12}}>{o.pct}%</span>
              </div>
              <p style={{color:"rgba(226,232,240,.7)",fontSize:11,lineHeight:1.5}}>{o.text}</p>
              <div style={{height:3,background:"rgba(255,255,255,.08)",borderRadius:2,marginTop:6,overflow:"hidden"}}>
                <div style={{width:`${o.pct}%`,height:"100%",background:"linear-gradient(to right,#8b5cf6,#22d3ee)"}}/>
              </div>
            </div>
          ))}
          <button className="mbtn mbtn-cancel" onClick={reset} style={{marginTop:12}}>↺ 繼續上傳</button>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════
//  點數 Tab
// ═══════════════════════════════
function Points({showNotif,data,updateData}){
  const level = Math.floor(data.points/250)+1;
  const nextPts = level*250;
  const pct = ((data.points-(level-1)*250)/250)*100;
  const today = new Date().toDateString();
  const canCI = data.lastCheckIn!==today;
  const successN = data.uploads.filter(u=>u.type==="place"&&u.verifiedSuccess).length;

  const missions=[
    {name:"探靈者", need:10,  icon:"👁️"},
    {name:"尋靈者", need:50,  icon:"🕯️"},
    {name:"靈界行者",need:100,icon:"🌀"},
  ];

  const checkIn=()=>{
    updateData(prev=>({...prev,points:prev.points+1,lastCheckIn:today}));
    showNotif("每日打卡！+1 點");
  };

  const magicCount = data.uploads.filter(u=>u.type==="magic").length;
  const creatureCount = data.uploads.filter(u=>u.type==="creature").length;

  const achievements=[
    {icon:"🌟",label:"首次上傳",desc:"完成第一次打卡",done:data.uploads.length>=1},
    {icon:"🔮",label:"魔法使者",desc:`施法10次（${magicCount}/10）`,done:magicCount>=10},
    {icon:"🐉",label:"生物學者",desc:`拍攝5次生物（${creatureCount}/5）`,done:creatureCount>=5},
    {icon:"🗺️",label:"地點探索",desc:`探尋3個地點（${Math.min(data.uploads.filter(u=>u.type==="place").length,3)}/3）`,done:data.uploads.filter(u=>u.type==="place").length>=3},
    {icon:"✨",label:"繪畫大師",desc:`繪製5幅（${data.drawings.length}/5）`,done:data.drawings.length>=5},
    {icon:"💎",label:"點數收藏家",desc:`累積1000點（${data.points}/1000）`,done:data.points>=1000},
  ];

  return (
    <div className="tab-in">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
        <h2 style={{fontFamily:"'Cinzel',serif",fontSize:17,letterSpacing:1}}>我的神秘點數</h2>
        <button onClick={canCI?checkIn:undefined} style={{
          background:canCI?"linear-gradient(135deg,#7c3aed,#0891b2)":"rgba(139,92,246,.15)",
          color:canCI?"#fff":"rgba(226,232,240,.4)",border:"none",padding:"6px 14px",
          borderRadius:100,fontSize:11,cursor:canCI?"pointer":"default",fontFamily:"'Cinzel',serif"
        }}>{canCI?"每日打卡 +1":"今日已打卡"}</button>
      </div>
      <div style={{textAlign:"center",marginBottom:20,padding:"22px 12px",position:"relative",borderRadius:18,overflow:"hidden"}}>
        <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse at center,rgba(139,92,246,.14),transparent 70%)"}}/>
        <div style={{position:"relative"}}>
          <div style={{width:110,height:110,margin:"0 auto 14px"}}>
            <div className="spin-ring" style={{width:110,height:110,borderRadius:"50%",padding:3,background:"conic-gradient(from 0deg,#7c3aed,#0891b2,#a78bfa,#7c3aed)"}}>
              <div style={{width:"100%",height:"100%",borderRadius:"50%",background:"#0d0d1a",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <span style={{fontSize:30}}>💎</span>
              </div>
            </div>
          </div>
          <div className="grad-text" style={{fontSize:38,fontWeight:900,lineHeight:1,marginBottom:4}}>{data.points.toLocaleString()}</div>
          <p style={{color:"rgba(167,139,250,.65)",fontFamily:"'Cinzel',serif",fontSize:12,letterSpacing:3}}>Lv.{level} 術士</p>
        </div>
      </div>
      <div className="card" style={{marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
          <span style={{color:"#a78bfa",fontSize:12,fontFamily:"'Cinzel',serif"}}>升至 Lv.{level+1}</span>
          <span style={{color:"rgba(226,232,240,.4)",fontSize:11}}>{data.points} / {nextPts}</span>
        </div>
        <div style={{height:6,background:"rgba(139,92,246,.18)",borderRadius:3,overflow:"hidden"}}>
          <div style={{width:`${Math.min(pct,100)}%`,height:"100%",background:"linear-gradient(to right,#7c3aed,#0891b2)"}}/>
        </div>
      </div>

      <p className="sec-title">✦ 成就勳章</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:20}}>
        {achievements.map((a,i)=>(
          <div key={i} className="card" style={{display:"flex",alignItems:"center",gap:8,padding:12,opacity:a.done?1:.55}}>
            <span style={{fontSize:20,filter:a.done?"none":"grayscale(1)"}}>{a.icon}</span>
            <div>
              <div style={{fontFamily:"'Cinzel',serif",color:a.done?"#a78bfa":"rgba(226,232,240,.5)",fontSize:11,marginBottom:1}}>{a.label}{a.done?" ✓":""}</div>
              <div style={{color:"rgba(226,232,240,.35)",fontSize:9}}>{a.desc}</div>
            </div>
          </div>
        ))}
      </div>

      <p className="sec-title">✦ 探靈稱號任務（靈界自動驗證）</p>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {missions.map(m=>{
          const prg = Math.min((successN/m.need)*100,100);
          const done = successN>=m.need;
          return (
            <div key={m.name} className="card" style={{padding:12}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:18}}>{m.icon}</span>
                  <span style={{fontSize:13,fontWeight:700,color:done?"#22d3ee":"#e2e8f0"}}>{m.name}{done?" ✓":""}</span>
                </div>
                <span style={{fontSize:11,color:"rgba(226,232,240,.45)"}}>{successN} / {m.need}</span>
              </div>
              <div style={{height:5,background:"rgba(255,255,255,.06)",borderRadius:3,overflow:"hidden",marginBottom:4}}>
                <div style={{width:`${prg}%`,height:"100%",background:done?"linear-gradient(to right,#10b981,#34d399)":"linear-gradient(to right,#7c3aed,#0891b2)"}}/>
              </div>
              <p style={{fontSize:10,color:"rgba(226,232,240,.3)"}}>只有靈界驗證成功的探靈才計入次數</p>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ═══════════════════════════════
//  商店 Tab
// ═══════════════════════════════
function Shop({showNotif,data,updateData}){
  const [filter,setFilter]=useState("all");
  const [modal,setModal]=useState(null);
  const filters=[
    {id:"all",   label:"全部",icon:"✦"},
    {id:"magic", label:"魔法",icon:"✨"},
    {id:"summon",label:"召喚",icon:"🦊"},
    {id:"item",  label:"道具",icon:"📜"},
    {id:"title", label:"稱號",icon:"👑"},
  ];
  const filtered = SHOP_ITEMS.filter(i=>filter==="all"||i.type===filter);
  const isMagic = item => item.type==="magic";
  const isOwned = item => !isMagic(item) && data.purchased.includes(item.id);

  const buy=item=>{
    if(isOwned(item)){showNotif("已擁有此項目");return;}
    setModal(item);
  };
  const confirm=item=>{
    const st=checkReq(item.req,data);
    if(!st.ok){showNotif("條件未達成："+st.msg);setModal(null);return;}
    if(data.points<item.cost){showNotif("神秘點數不足！");setModal(null);return;}
    updateData(prev=>({...prev,points:prev.points-item.cost,purchased:[...prev.purchased,item.id]}));
    setModal(null);
    showNotif("已解鎖「"+item.name+"」！");
  };

  return (
    <div className="tab-in">
      <h2 style={{fontFamily:"'Cinzel',serif",fontSize:17,letterSpacing:1,marginBottom:4}}>神秘兌換商店</h2>
      <p style={{color:"rgba(226,232,240,.45)",fontSize:12,marginBottom:12}}>消耗點數兌換，購買後聯繫管理員發放</p>
      <div className="filter-bar" style={{marginBottom:14}}>
        {filters.map(f=>(
          <span key={f.id} className="fpill" onClick={()=>setFilter(f.id)} style={{
            borderColor:filter===f.id?"rgba(167,139,250,.7)":"rgba(139,92,246,.2)",
            background:filter===f.id?"rgba(139,92,246,.2)":"transparent",
            color:filter===f.id?"#a78bfa":"rgba(226,232,240,.45)",
          }}>{f.icon} {f.label}</span>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {filtered.map(item=>{
          const owned=isOwned(item);
          const ownedCount=data.purchased.filter(id=>id===item.id).length;
          const st=checkReq(item.req,data);
          return (
            <div key={item.id} className={`shop-item${owned?" owned":""}`} onClick={()=>buy(item)}>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:26,marginBottom:6}}>{item.icon}</div>
                <div style={{color:"#e2e8f0",fontSize:11,fontWeight:600,marginBottom:4}}>{item.name}</div>
                <div style={{color:"rgba(226,232,240,.4)",fontSize:9,marginBottom:6,minHeight:22,lineHeight:1.4}}>{item.desc}</div>
                {owned?(
                  <span className="tag" style={{background:"rgba(52,211,153,.14)",border:"1px solid rgba(52,211,153,.3)",color:"#34d399"}}>✓ 已解鎖</span>
                ):item.type==="title"&&!st.ok?(
                  <span className="tag" style={{background:"rgba(239,68,68,.12)",border:"1px solid rgba(239,68,68,.3)",color:"#ef4444",fontSize:9}}>🔒 條件未達</span>
                ):(
                  <span className="tag" style={{background:"rgba(245,158,11,.14)",border:"1px solid rgba(245,158,11,.3)",color:"#fbbf24"}}>
                    💎 {item.cost}{isMagic(item)&&ownedCount>0?" ×"+ownedCount:""}
                  </span>
                )}
              </div>
            </div>
          );
        })}
      </div>
      {modal&&<BuyModal item={modal} data={data} onConfirm={()=>confirm(modal)} onCancel={()=>setModal(null)}/>}
    </div>
  );
}

function BuyModal({item,data,onConfirm,onCancel}){
  const st = checkReq(item.req,data);
  const canAfford = data.points >= item.cost;
  return (
    <div className="modal-overlay" onClick={onCancel}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:50,marginBottom:10}}>{item.icon}</div>
        <h3 style={{fontSize:17,fontWeight:700,marginBottom:4}}>{item.name}</h3>
        <p style={{color:"rgba(226,232,240,.5)",fontSize:11,marginBottom:14}}>{item.desc}</p>
        <div style={{background:"rgba(139,92,246,.1)",borderRadius:12,padding:14,marginBottom:14,textAlign:"left"}}>
          {item.req&&(
            <div style={{marginBottom:10,paddingBottom:10,borderBottom:"1px solid rgba(139,92,246,.2)"}}>
              <p style={{color:st.ok?"#34d399":"#f59e0b",fontSize:11,marginBottom:st.ok?0:4}}>
                {st.ok?"✅ 條件已達成":"⚠️ 條件未達成"}
              </p>
              {!st.ok&&<p style={{color:"rgba(226,232,240,.5)",fontSize:10}}>{st.msg}</p>}
            </div>
          )}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <p style={{color:"rgba(226,232,240,.6)",fontSize:11}}>所需點數</p>
            <p style={{color:"#fbbf24",fontSize:18,fontWeight:900}}>💎 {item.cost}</p>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <p style={{color:"rgba(226,232,240,.6)",fontSize:11}}>目前擁有</p>
            <p style={{color:canAfford?"#34d399":"#ef4444",fontSize:14,fontWeight:700}}>💎 {data.points}</p>
          </div>
          <div style={{borderTop:"1px solid rgba(139,92,246,.2)",paddingTop:10}}>
            <p style={{color:"rgba(226,232,240,.5)",fontSize:11,marginBottom:4}}>購買後聯繫管理員微信</p>
            <p style={{color:"#fbbf24",fontFamily:"'Cinzel',serif",fontSize:15,fontWeight:700,letterSpacing:1}}>db371928356</p>
          </div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button className="mbtn" style={{flex:1,padding:10,fontSize:12}} onClick={onConfirm} disabled={!st.ok||!canAfford}>
            {!canAfford?"點數不足":!st.ok?"未達條件":"確認兌換"}
          </button>
          <button className="mbtn mbtn-cancel" style={{flex:1,padding:10,fontSize:12}} onClick={onCancel}>取消</button>
        </div>
      </div>
    </div>
  );
}

//  紀錄 Tab
// ═══════════════════════════════
function Records({showNotif,data,updateData}){
  const [view,setView]=useState(null);
  const recs=data.uploads;
  const totalPts=recs.reduce((s,u)=>s+u.points,0);
  const days=new Set(recs.map(u=>new Date(u.timestamp).toDateString())).size;

  const del=id=>{
    if(!confirm("確定刪除這筆紀錄？"))return;
    updateData(prev=>({...prev,uploads:prev.uploads.filter(u=>u.id!==id)}));
    setView(null); showNotif("已刪除");
  };

  return (
    <div className="tab-in">
      <h2 style={{fontFamily:"'Cinzel',serif",fontSize:17,letterSpacing:1,marginBottom:14}}>探險紀錄</h2>
      <div className="card" style={{background:"rgba(139,92,246,.04)",marginBottom:14,display:"flex",justifyContent:"space-around",textAlign:"center",padding:14}}>
        {[{v:recs.length,l:"總任務"},{v:totalPts,l:"總點數"},{v:days,l:"活躍天"}].map((s,i)=>(
          <div key={i}>
            <div style={{fontFamily:"'Cinzel',serif",color:"#a78bfa",fontSize:20,fontWeight:700}}>{s.v}</div>
            <div style={{color:"rgba(226,232,240,.38)",fontSize:10,marginTop:2}}>{s.l}</div>
          </div>
        ))}
      </div>
      {recs.length===0 ? (
        <div className="empty-tip">
          <div style={{fontSize:40,marginBottom:12,opacity:.4}}>📭</div>
          <p>尚無探險紀錄</p><p style={{marginTop:4,fontSize:11}}>去上傳你的第一張照片吧！</p>
        </div>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {recs.map(rec=>(
            <div key={rec.id} className="card" style={{display:"flex",gap:12,alignItems:"center",cursor:"pointer",padding:12}} onClick={()=>setView(rec)}>
              <img src={rec.preview} alt="" style={{width:50,height:50,borderRadius:10,objectFit:"cover",flexShrink:0}}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                  <span className="tag" style={{background:"rgba(139,92,246,.14)",border:"1px solid rgba(139,92,246,.3)",color:"#a78bfa"}}>{rec.subType||rec.label}</span>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    {rec.verifiedSuccess&&<span style={{color:"#34d399",fontSize:10}}>✓驗證</span>}
                    <span style={{color:"#34d399",fontSize:12,fontWeight:700}}>+{rec.points}</span>
                  </div>
                </div>
                <p style={{color:"rgba(226,232,240,.8)",fontSize:12,marginBottom:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{rec.note||"探索紀錄"}</p>
                <p style={{color:"rgba(226,232,240,.32)",fontSize:10}}>{rec.time}</p>
              </div>
            </div>
          ))}
        </div>
      )}
      {view&&(
        <div className="modal-overlay" onClick={()=>setView(null)}>
          <div className="modal-box" onClick={e=>e.stopPropagation()} style={{maxWidth:380,textAlign:"left"}}>
            <img src={view.preview} alt="" style={{width:"100%",maxHeight:280,objectFit:"contain",borderRadius:10,marginBottom:12,background:"rgba(0,0,0,.3)"}}/>
            <div style={{marginBottom:12}}>
              <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap"}}>
                <span className="tag" style={{background:"rgba(139,92,246,.14)",border:"1px solid rgba(139,92,246,.3)",color:"#a78bfa"}}>{view.subType||view.label}</span>
                {view.verifiedSuccess&&<span className="tag" style={{background:"rgba(52,211,153,.14)",border:"1px solid rgba(52,211,153,.3)",color:"#34d399"}}>✓靈界驗證</span>}
              </div>
              <p style={{fontSize:14,color:"#e2e8f0",marginBottom:6}}>{view.note||"探索紀錄"}</p>
              <p style={{color:"rgba(226,232,240,.45)",fontSize:11,marginBottom:4}}>{view.time}</p>
              <p style={{color:"#34d399",fontSize:13,fontWeight:700}}>獲得 +{view.points} 點</p>
            </div>
            {view.result&&(
              <div style={{background:"rgba(139,92,246,.08)",borderRadius:10,padding:10,marginBottom:12}}>
                <p style={{color:"#a78bfa",fontFamily:"'Cinzel',serif",fontSize:11,marginBottom:4}}>占卜結果</p>
                <p style={{color:"rgba(226,232,240,.55)",fontSize:11}}>成功 {view.result.p1}% · 中等 {view.result.p2}% · 困難 {view.result.p3}%</p>
              </div>
            )}
            <div style={{display:"flex",gap:8}}>
              <button className="mbtn mbtn-cancel" style={{flex:1,padding:10,fontSize:12}} onClick={()=>setView(null)}>關閉</button>
              <button className="mbtn mbtn-danger" style={{flex:1,padding:10,fontSize:12}} onClick={()=>del(view.id)}>刪除</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

//  討論 Tab

function Discuss({showNotif,data,updateData,role}){
  const [post,setPost]=useState("");
  const [tag,setTag]=useState("魔法道法");
  const [view,setView]=useState(null);
  const displayName = data.customName||(role==="admin"?"管理員":"見習術士");
  const tags=[
    {name:"魔法道法",c:"#8b5cf6"},{name:"神秘生物",c:"#10b981"},
    {name:"神秘地點",c:"#3b82f6"},{name:"攻略",c:"#f59e0b"},
  ];

  const submit=()=>{
    if(!post.trim()){showNotif("請輸入內容");return;}
    const tc=tags.find(t=>t.name===tag).c;
    updateData(prev=>({...prev,posts:[{id:Date.now(),user:displayName,avatar:role==="admin"?"⚔️":"🧙",title:post,replies:0,likes:0,liked:false,time:"剛剛",tag,tc,isMine:true},...prev.posts]}));
    setPost(""); showNotif("貼文已發布！");
  };

  const like=id=>{
    updateData(prev=>({...prev,posts:prev.posts.map(p=>p.id===id?{...p,likes:p.liked?p.likes-1:p.likes+1,liked:!p.liked}:p)}));
  };

  const del=id=>{
    if(!confirm("確定刪除？"))return;
    updateData(prev=>({...prev,posts:prev.posts.filter(p=>p.id!==id)}));
    setView(null); showNotif("已刪除");
  };

  return (
    <div className="tab-in">
      <h2 style={{fontFamily:"'Cinzel',serif",fontSize:17,letterSpacing:1,marginBottom:14}}>公共討論區</h2>
      <div className="card" style={{marginBottom:16}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
          <span style={{fontSize:20}}>{role==="admin"?"⚔️":"🧙"}</span>
          <span style={{fontFamily:"'Cinzel',serif",color:"#a78bfa",fontSize:12}}>{displayName}</span>
        </div>
        <textarea placeholder="分享你的探險心得、儀式筆記或提問..." value={post} onChange={e=>setPost(e.target.value)} style={{marginBottom:10}}/>
        <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
          {tags.map(t=>(
            <span key={t.name} className="fpill" onClick={()=>setTag(t.name)} style={{
              borderColor:tag===t.name?t.c:"rgba(139,92,246,.2)",
              background:tag===t.name?t.c+"20":"transparent",
              color:tag===t.name?t.c:"rgba(226,232,240,.5)",
            }}>{t.name}</span>
          ))}
        </div>
        <button className="mbtn mbtn-sm" onClick={submit}>✦ 發布貼文</button>
      </div>
      {data.posts.length===0?(
        <div className="empty-tip">
          <div style={{fontSize:36,marginBottom:8,opacity:.35}}>💬</div>
          <p>尚無貼文，來發布第一篇吧！</p>
        </div>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {data.posts.map(d=>(
            <div key={d.id} className="card" style={{padding:14,cursor:"pointer"}} onClick={()=>setView(d)}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                <span style={{fontSize:20}}>{d.avatar}</span>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                    <span style={{fontFamily:"'Cinzel',serif",color:"#e2e8f0",fontSize:11}}>{d.user}</span>
                    <span className="tag" style={{background:d.tc+"20",border:"1px solid "+d.tc+"40",color:d.tc}}>{d.tag}</span>
                    {d.isMine&&<span className="tag" style={{background:"rgba(245,158,11,.14)",border:"1px solid rgba(245,158,11,.3)",color:"#fbbf24"}}>我的</span>}
                  </div>
                  <span style={{color:"rgba(226,232,240,.32)",fontSize:10}}>{d.time}</span>
                </div>
              </div>
              <p style={{color:"rgba(226,232,240,.83)",fontSize:12,marginBottom:10,lineHeight:1.55}}>{d.title}</p>
              <div style={{display:"flex",gap:14}}>
                <span style={{color:"rgba(226,232,240,.38)",fontSize:11}}>💬 {d.replies}</span>
                <span style={{color:d.liked?"#ef4444":"rgba(226,232,240,.38)",fontSize:11,cursor:"pointer"}} onClick={e=>{e.stopPropagation();like(d.id);}}>❤️ {d.likes}</span>
              </div>
            </div>
          ))}
        </div>
      )}
      {view&&(
        <div className="modal-overlay" onClick={()=>setView(null)}>
          <div className="modal-box" onClick={e=>e.stopPropagation()} style={{textAlign:"left"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
              <span style={{fontSize:28}}>{view.avatar}</span>
              <div>
                <p style={{fontFamily:"'Cinzel',serif",color:"#a78bfa",fontSize:13}}>{view.user}</p>
                <p style={{color:"rgba(226,232,240,.32)",fontSize:10}}>{view.time}</p>
              </div>
            </div>
            <span className="tag" style={{background:view.tc+"20",border:"1px solid "+view.tc+"40",color:view.tc,marginBottom:10,display:"inline-block"}}>{view.tag}</span>
            <p style={{color:"#e2e8f0",fontSize:13,lineHeight:1.7,marginBottom:14}}>{view.title}</p>
            <div style={{display:"flex",gap:16,marginBottom:14,paddingBottom:14,borderBottom:"1px solid rgba(139,92,246,.15)"}}>
              <span style={{color:"rgba(226,232,240,.5)",fontSize:12}}>💬 {view.replies}</span>
              <span style={{color:view.liked?"#ef4444":"rgba(226,232,240,.5)",fontSize:12,cursor:"pointer"}} onClick={()=>like(view.id)}>❤️ {view.likes}</span>
            </div>
            {view.isMine?(
              <div style={{display:"flex",gap:8}}>
                <button className="mbtn mbtn-cancel" style={{flex:1,padding:10,fontSize:12}} onClick={()=>setView(null)}>關閉</button>
                <button className="mbtn mbtn-danger" style={{flex:1,padding:10,fontSize:12}} onClick={()=>del(view.id)}>刪除</button>
              </div>
            ):(
              <button className="mbtn mbtn-cancel" style={{padding:10,fontSize:12}} onClick={()=>setView(null)}>關閉</button>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════
//  繪符 Tab
// ═══════════════════════════════
function Draw({showNotif,data,updateData}){
  const canvasRef=useRef(null);
  const [drawing,setDrawing]=useState(false);
  const [color,setColor]=useState("#a78bfa");
  const [size,setSize]=useState(4);
  const [mode,setMode]=useState("draw");
  const [drawType,setDrawType]=useState("一般魔法陣");

  useEffect(()=>{
    const c=canvasRef.current; if(!c) return;
    const ctx=c.getContext("2d");
    ctx.fillStyle="#0d0d1a";
    ctx.fillRect(0,0,c.width,c.height);
  },[]);

  const colors=["#a78bfa","#06b6d4","#f59e0b","#ef4444","#10b981","#ffffff"];

  const getPos=e=>{
    const r=canvasRef.current.getBoundingClientRect();
    const scX=canvasRef.current.width/r.width, scY=canvasRef.current.height/r.height;
    return {x:((e.clientX||e.touches?.[0]?.clientX)-r.left)*scX, y:((e.clientY||e.touches?.[0]?.clientY)-r.top)*scY};
  };

  const start=e=>{ e.preventDefault(); const ctx=canvasRef.current.getContext("2d"); ctx.beginPath(); ctx.moveTo(getPos(e).x,getPos(e).y); setDrawing(true); };
  const move=e=>{ if(!drawing) return; e.preventDefault(); const ctx=canvasRef.current.getContext("2d"); const {x,y}=getPos(e); ctx.lineWidth=size; ctx.lineCap="round"; ctx.strokeStyle=mode==="erase"?"#0d0d1a":color; ctx.lineTo(x,y); ctx.stroke(); };
  const end=()=>setDrawing(false);

  const clear=()=>{
    const ctx=canvasRef.current.getContext("2d");
    ctx.fillStyle="#0d0d1a"; ctx.fillRect(0,0,800,500);
    showNotif("畫布已清除");
  };

  const download=()=>{
    const a=document.createElement("a");
    a.href=canvasRef.current.toDataURL("image/png");
    a.download=`魔法陣_${Date.now()}.png`; a.click();
    showNotif("已下載圖片");
  };

  const submit=()=>{
    const pts=data.todayDrawPts<5?5:0;
    const img=canvasRef.current.toDataURL("image/png");
    updateData(prev=>({
      ...prev,
      drawings:[{id:Date.now(),image:img,subType:drawType,time:new Date().toLocaleDateString("zh-TW"),timestamp:Date.now()},...prev.drawings],
      todayDrawPts:prev.todayDrawPts+pts,
      points:prev.points+pts,
      lastDrawDate:new Date().toDateString()
    }));
    showNotif(pts>0?"繪符提交！+"+pts+" 點":"繪符紀錄已保存（成就+1）");
    clear();
  };

  return (
    <div className="tab-in">
      <h2 style={{fontFamily:"'Cinzel',serif",fontSize:17,letterSpacing:1,marginBottom:4}}>魔法符陣繪製</h2>
      <p style={{color:"rgba(226,232,240,.45)",fontSize:12,marginBottom:12}}>每日限獲得5點，可無限繪製累積成就</p>
      <div style={{marginBottom:10,padding:10,background:"rgba(139,92,246,.1)",borderRadius:10}}>
        <p style={{color:"rgba(226,232,240,.6)",fontSize:11,marginBottom:4}}>今日：<span style={{color:"#fbbf24",fontWeight:700}}>{data.todayDrawPts} / 5 點</span></p>
        <div style={{height:5,background:"rgba(255,255,255,.08)",borderRadius:3,overflow:"hidden"}}>
          <div style={{width:`${Math.min((data.todayDrawPts/5)*100,100)}%`,height:"100%",background:"linear-gradient(to right,#8b5cf6,#22d3ee)"}}/>
        </div>
      </div>
      <div style={{marginBottom:10}}>
        <label style={{display:"block",color:"rgba(167,139,250,.8)",fontFamily:"'Cinzel',serif",fontSize:11,marginBottom:6}}>繪符目標（影響成就進度）</label>
        <select value={drawType} onChange={e=>setDrawType(e.target.value)}>
          <option value="一般魔法陣">一般魔法陣</option>
          <option value="盧恩符文">盧恩符文</option>
          <option value="符籙">符籙</option>
        </select>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap",alignItems:"center"}}>
        {colors.map(c=>(
          <button key={c} onClick={()=>{setColor(c);setMode("draw");}} style={{width:32,height:32,borderRadius:6,background:c,border:(color===c&&mode==="draw")?"2px solid #fff":"1px solid rgba(255,255,255,.15)",cursor:"pointer",flexShrink:0}}/>
        ))}
        <button onClick={()=>setMode("erase")} style={{padding:"6px 12px",height:32,borderRadius:6,background:"rgba(139,92,246,.2)",color:mode==="erase"?"#fff":"rgba(226,232,240,.7)",border:mode==="erase"?"2px solid #fff":"1px solid rgba(255,255,255,.15)",cursor:"pointer",fontSize:12}}>橡皮擦</button>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
        <span style={{color:"rgba(226,232,240,.6)",fontFamily:"'Cinzel',serif",fontSize:11,whiteSpace:"nowrap"}}>大小</span>
        <input type="range" min="1" max="40" value={size} onChange={e=>setSize(Number(e.target.value))} style={{flex:1}}/>
        <span style={{color:"#a78bfa",fontSize:11,minWidth:32}}>{size}px</span>
      </div>
      <canvas ref={canvasRef} width={800} height={500}
        onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end}
        onTouchStart={start} onTouchMove={move} onTouchEnd={end}
        style={{border:"2px solid rgba(139,92,246,.3)",borderRadius:10,width:"100%",touchAction:"none",marginBottom:12,display:"block"}}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
        <button className="mbtn mbtn-cancel mbtn-sm" onClick={clear}>🗑️ 清除</button>
        <button className="mbtn mbtn-cancel mbtn-sm" onClick={download}>💾 下載</button>
        <button className="mbtn mbtn-sm" onClick={submit}>📤 提交</button>
      </div>
      {data.drawings.length>0&&(
        <>
          <p className="sec-title">✦ 作品集（{data.drawings.length}幅）</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
            {data.drawings.slice(0,12).map(d=>(
              <div key={d.id} style={{position:"relative"}}>
                <img src={d.image} alt="" style={{width:"100%",aspectRatio:"1.6",objectFit:"cover",borderRadius:8,border:"1px solid rgba(139,92,246,.2)"}}/>
                <span style={{position:"absolute",bottom:3,right:4,fontSize:9,color:"rgba(226,232,240,.5)"}}>{d.subType}</span>
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

// ═══════════════════════════════
//  個人檔案 Tab
// ═══════════════════════════════
function Profile({role,data,updateData,onLogout,showNotif}){
  const [titleModal,setTitleModal]=useState(false);
  const [nameModal,setNameModal]=useState(false);
  const [newName,setNewName]=useState("");

  const autoTitles=getAutoTitles(data);
  const allItems=[...SHOP_ITEMS,...autoTitles];
  const ownedTitles=[
    ...SHOP_ITEMS.filter(i=>data.purchased.includes(i.id)&&i.type==="title"),
    ...autoTitles
  ];
  const currentTitle=data.currentTitle?allItems.find(s=>s.id===data.currentTitle):null;
  const level=Math.floor(data.points/250)+1;
  const displayName=data.customName||(role==="admin"?"管理員":"見習術士");

  // 已購魔法統計
  const magicMap={};
  data.purchased.forEach(id=>{
    const item=SHOP_ITEMS.find(i=>i.id===id&&i.type==="magic");
    if(item) magicMap[item.name]=(magicMap[item.name]||0)+1;
  });
  const otherOwned=SHOP_ITEMS.filter(i=>data.purchased.includes(i.id)&&i.type!=="title"&&i.type!=="magic");

  const changeName=()=>{
    if(!newName.trim()){showNotif("請輸入名稱");return;}
    if(newName.trim().length>12){showNotif("名稱不能超過12字");return;}
    updateData(prev=>({...prev,customName:newName.trim()}));
    setNameModal(false); setNewName(""); showNotif("名稱已更改！");
  };

  const setTitle=id=>{updateData(prev=>({...prev,currentTitle:id}));setTitleModal(false);showNotif("稱號已切換");};
  const clearTitle=()=>{updateData(prev=>({...prev,currentTitle:null}));setTitleModal(false);showNotif("已卸下稱號");};
  const reset=()=>{
    if(!confirm("確定重置所有數據？此操作無法復原！"))return;
    updateData({...defaultData,joinDate:new Date().toLocaleDateString("zh-TW"),lastDrawDate:new Date().toDateString()});
    showNotif("已重置");
  };

  return (
    <div className="tab-in">
      <h2 style={{fontFamily:"'Cinzel',serif",fontSize:17,marginBottom:18}}>個人檔案</h2>
      {/* 主卡片 */}
      <div className="card" style={{background:"rgba(139,92,246,.08)",marginBottom:12,textAlign:"center",padding:20}}>
        <div style={{fontSize:44,marginBottom:10}}>{role==="admin"?"⚔️":"🧙"}</div>
        <h3 className="grad-text" style={{fontFamily:"'Cinzel Decorative',serif",fontSize:19,marginBottom:4}}>{displayName}</h3>
        <p style={{color:"rgba(226,232,240,.6)",fontFamily:"'Cinzel',serif",fontSize:12,marginBottom:16}}>
          {currentTitle?`${currentTitle.icon} ${currentTitle.name}`:"見習魔法師"}
        </p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          {[{label:"等級",value:`Lv.${level}`},{label:"點數",value:data.points},{label:"稱號",value:ownedTitles.length}].map((s,i)=>(
            <div key={i}>
              <p style={{color:"#a78bfa",fontSize:9,fontFamily:"'Cinzel',serif",marginBottom:2}}>{s.label}</p>
              <p style={{fontSize:15,fontWeight:700}}>{s.value}</p>
            </div>
          ))}
        </div>
      </div>

      {/* 名稱設定 */}
      <div className="card" style={{marginBottom:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <p className="sec-title" style={{marginBottom:0}}>✦ 術士名號</p>
          <button onClick={()=>{setNewName(data.customName||"");setNameModal(true);}} style={{background:"rgba(139,92,246,.2)",border:"1px solid rgba(139,92,246,.3)",color:"#a78bfa",padding:"4px 10px",borderRadius:6,fontSize:10,cursor:"pointer"}}>更改</button>
        </div>
        <p style={{fontSize:13,color:"#e2e8f0"}}>{displayName}</p>
      </div>

      {/* 稱號 */}
      <div className="card" style={{marginBottom:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <p className="sec-title" style={{marginBottom:0}}>✦ 當前稱號</p>
          <button onClick={()=>setTitleModal(true)} style={{background:"rgba(139,92,246,.2)",border:"1px solid rgba(139,92,246,.3)",color:"#a78bfa",padding:"4px 10px",borderRadius:6,fontSize:10,cursor:"pointer"}}>切換</button>
        </div>
        {currentTitle?(
          <div style={{display:"flex",gap:10,alignItems:"center",padding:10,background:"rgba(139,92,246,.08)",borderRadius:8}}>
            <span style={{fontSize:22}}>{currentTitle.icon}</span>
            <div><p style={{color:"#a78bfa",fontSize:13,fontWeight:600}}>{currentTitle.name}</p><p style={{color:"rgba(226,232,240,.4)",fontSize:10}}>{currentTitle.desc}</p></div>
          </div>
        ):<p style={{fontSize:12,color:"rgba(226,232,240,.4)",padding:"8px 0"}}>未配戴稱號</p>}
      </div>

      {/* 已學魔法 */}
      {Object.keys(magicMap).length>0&&(
        <div className="card" style={{marginBottom:10}}>
          <p className="sec-title">✦ 已學魔法</p>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {Object.entries(magicMap).map(([name,count])=>(
              <span key={name} className="tag" style={{background:"rgba(139,92,246,.1)",border:"1px solid rgba(139,92,246,.25)",color:"#a78bfa",padding:"4px 10px"}}>
                {name} {count>1?`×${count}`:""}
              </span>
            ))}
          </div>
        </div>
      )}

      {/* 已解鎖其他 */}
      {otherOwned.length>0&&(
        <div className="card" style={{marginBottom:10}}>
          <p className="sec-title">✦ 已解鎖技能</p>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {otherOwned.map(item=>(
              <span key={item.id} className="tag" style={{background:"rgba(139,92,246,.1)",border:"1px solid rgba(139,92,246,.25)",color:"#a78bfa"}}>
                {item.icon} {item.name}
              </span>
            ))}
          </div>
        </div>
      )}

      {/* 帳號資訊 */}
      <div className="card" style={{marginBottom:12,fontSize:12}}>
        <p className="sec-title">✦ 帳號資訊</p>
        {[
          {l:"帳號",v:role==="admin"?"管理員":"@@"},
          {l:"身份",v:role==="admin"?"管理員":"一般用戶"},
          {l:"加入日期",v:data.joinDate||"—"},
          {l:"登入次數",v:data.loginCount},
          {l:"上傳總數",v:data.uploads.length},
          {l:"繪圖總數",v:data.drawings.length},
        ].map((s,i)=>(
          <p key={i} style={{color:"rgba(226,232,240,.6)",marginBottom:6,display:"flex",justifyContent:"space-between"}}>
            <span>{s.l}</span><span style={{color:"#e2e8f0"}}>{s.v}</span>
          </p>
        ))}
      </div>

      <button className="mbtn mbtn-cancel" style={{marginBottom:8}} onClick={onLogout}>🚪 登出</button>
      <button className="mbtn mbtn-danger" onClick={reset}>⚠️ 重置所有數據</button>

      {/* 稱號選擇 Modal */}
      {titleModal&&(
        <div className="modal-overlay" onClick={()=>setTitleModal(false)}>
          <div className="modal-box" onClick={e=>e.stopPropagation()} style={{textAlign:"left",maxWidth:360}}>
            <h3 style={{fontSize:15,marginBottom:14,textAlign:"center",color:"#a78bfa"}}>選擇配戴稱號</h3>
            {ownedTitles.length===0?(
              <p style={{textAlign:"center",color:"rgba(226,232,240,.4)",fontSize:12,padding:"20px 0"}}>尚未擁有任何稱號</p>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14,maxHeight:"55vh",overflowY:"auto"}}>
                {ownedTitles.map(item=>(
                  <div key={item.id} onClick={()=>setTitle(item.id)} style={{
                    padding:10,background:data.currentTitle===item.id?"rgba(139,92,246,.2)":"rgba(139,92,246,.06)",
                    border:`1px solid ${data.currentTitle===item.id?"#a78bfa":"rgba(139,92,246,.2)"}`,
                    borderRadius:8,cursor:"pointer",display:"flex",alignItems:"center",gap:10
                  }}>
                    <span style={{fontSize:22}}>{item.icon}</span>
                    <div style={{flex:1}}>
                      <p style={{color:"#a78bfa",fontSize:12,fontWeight:600}}>{item.name}</p>
                      <p style={{color:"rgba(226,232,240,.4)",fontSize:10}}>{item.desc}</p>
                    </div>
                    {data.currentTitle===item.id&&<span style={{color:"#34d399",fontSize:14}}>✓</span>}
                  </div>
                ))}
              </div>
            )}
            <div style={{display:"flex",gap:8}}>
              <button className="mbtn mbtn-cancel" style={{flex:1,padding:10,fontSize:12}} onClick={()=>setTitleModal(false)}>取消</button>
              <button className="mbtn mbtn-cancel" style={{flex:1,padding:10,fontSize:12}} onClick={clearTitle}>卸下稱號</button>
            </div>
          </div>
        </div>
      )}

      {/* 更改名稱 Modal */}
      {nameModal&&(
        <div className="modal-overlay" onClick={()=>setNameModal(false)}>
          <div className="modal-box" onClick={e=>e.stopPropagation()}>
            <h3 style={{fontSize:15,marginBottom:14,color:"#a78bfa"}}>更改術士名號</h3>
            <input type="text" placeholder="輸入新名號（最多12字）" value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&changeName()} maxLength={12} style={{marginBottom:14}} autoFocus/>
            <div style={{display:"flex",gap:8}}>
              <button className="mbtn" style={{flex:1,padding:10,fontSize:12}} onClick={changeName}>確定</button>
              <button className="mbtn mbtn-cancel" style={{flex:1,padding:10,fontSize:12}} onClick={()=>setNameModal(false)}>取消</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
if(window.__hideLoading) window.__hideLoading();
</script>
