function showTitleModal(titles,currentId){const existing=$('title-modal');if(existing)existing.remove();const modal=E('div',{class:'modal-bg',id:'title-modal'});const list=titles.map(t=>`<div onclick="selectTitle(${typeof t.id==='number'?t.id:'"'+t.id+'"'})" style="padding:10px;background:${currentId===t.id?'rgba(139,92,246,.2)':'rgba(139,92,246,.06)'};border:1px solid ${currentId===t.id?'#a78bfa':'rgba(139,92,246,.2)'};border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:10px;margin-bottom:8px"><span style="font-size:22px">${t.icon}</span><div><p style="color:#a78bfa;font-size:12px;font-weight:600">${t.name}</p><p style="color:rgba(226,232,240,.4);font-size:10px">${t.desc}</p></div>${currentId===t.id?'<span style="color:#34d399;margin-left:auto;font-size:14px">вң“</span>':''}</div>`).join('');modal.innerHTML=`<div class="modal" style="text-align:left;max-height:80vh;overflow-y:auto"><h3 style="font-size:15px;text-align:center;margin-bottom:14px;color:#a78bfa">йҒёж“Үй…ҚжҲҙзЁұиҷҹ</h3>${titles.length===0?'<p style="text-align:center;color:rgba(226,232,240,.4);font-size:12px;padding:20px 0">е°ҡжңӘж“Ғжңүд»»дҪ•зЁұиҷҹ</p>':list}<div style="display:flex;gap:8px;margin-top:8px"><button class="btn btn-muted btn-sm" onclick="clearTitle()" style="flex:1">еҚёдёӢзЁұиҷҹ</button><button class="btn btn-muted btn-sm" id="title-cancel" style="flex:1">еҸ–ж¶Ҳ</button></div></div>`;document.body.appendChild(modal);$('title-cancel').onclick=()=>modal.remove();modal.onclick=e=>{if(e.target===modal)modal.remove();};}
window.selectTitle=function(id){updateData(d=>({...d,currentTitle:id}));const m=$('title-modal');if(m)m.remove();showNotif('зЁұиҷҹе·ІеҲҮжҸӣ');};
window.clearTitle=function(){updateData(d=>({...d,currentTitle:null}));const m=$('title-modal');if(m)m.remove();showNotif('е·ІеҚёдёӢзЁұиҷҹ');};
document.body.innerHTML=`<div id="bg" style="position:fixed;inset:0;pointer-events:none;overflow:hidden"></div><div id="notif" class="notif" style="display:none"></div><div id="app-content" style="height:100vh;height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto"></div>`;
initBg();
