<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#080810"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>玄秘紀元</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&family=Raleway:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#080810;height:100%;font-family:'Raleway',sans-serif;color:#e2e8f0;overflow:hidden}
#app{height:100vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative}

/* Stars */
.star{position:fixed;border-radius:50%;pointer-events:none;animation:blink var(--d,3s) ease-in-out infinite;animation-delay:var(--delay,0s)}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:.9}}
.particle{position:fixed;border-radius:50%;background:radial-gradient(circle,rgba(139,92,246,.8),transparent);animation:rise var(--d,8s) linear infinite;animation-delay:var(--delay,0s);pointer-events:none}
@keyframes rise{0%{transform:translateY(100vh);opacity:0}10%{opacity:.8}90%{opacity:.3}100%{transform:translateY(-10vh);opacity:0}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
.fade-in{animation:fadeIn .5s ease forwards}

/* Inputs */
input,textarea,select{background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.25);color:#e2e8f0;padding:11px 14px;border-radius:10px;width:100%;font-family:'Raleway',sans-serif;font-size:14px;outline:none;transition:border .2s}
input:focus,textarea:focus,select:focus{border-color:rgba(139,92,246,.7);box-shadow:0 0 20px rgba(139,92,246,.2)}
input::placeholder,textarea::placeholder{color:rgba(226,232,240,.35)}
textarea{resize:none;min-height:80px}
select option{background:#0d0d1a}
input[type=range]{padding:0;background:none;border:none;box-shadow:none;accent-color:#8b5cf6}
input[type=file]{display:none}

/* Buttons */
.btn{background:linear-gradient(135deg,#7c3aed,#0891b2);border:none;color:#fff;padding:13px;border-radius:10px;font-family:'Cinzel',serif;font-size:13px;letter-spacing:2px;cursor:pointer;width:100%;transition:all .2s;display:block;text-align:center}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(124,58,237,.5)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-muted{background:rgba(139,92,246,.25)!important;letter-spacing:1px!important}
.btn-danger{background:linear-gradient(135deg,#dc2626,#991b1b)!important}
.btn-sm{padding:9px;font-size:12px;letter-spacing:1px}

/* Cards */
.card{background:rgba(255,255,255,.025);border:1px solid rgba(139,92,246,.18);border-radius:14px;padding:16px}
.cat-card{border:2px solid rgba(139,92,246,.18);border-radius:14px;padding:14px 8px;text-align:center;cursor:pointer;transition:all .2s;background:rgba(255,255,255,.015)}
.cat-card.sel{border-color:#a78bfa;background:rgba(139,92,246,.12);transform:translateY(-3px)}
.up-zone{border:2px dashed rgba(139,92,246,.35);border-radius:14px;padding:22px;text-align:center;cursor:pointer;transition:all .2s;background:rgba(139,92,246,.04)}
.up-zone:hover{border-color:rgba(139,92,246,.7);background:rgba(139,92,246,.08)}
.oracle-box{background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.2);border-radius:10px;padding:12px;margin:8px 0}
.shop-item{background:rgba(255,255,255,.025);border:1px solid rgba(139,92,246,.18);border-radius:12px;padding:12px;cursor:pointer;transition:all .2s;text-align:center}
.shop-item:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(139,92,246,.12)}
.disc-card{border:1px solid rgba(139,92,246,.15);border-radius:14px;padding:14px;cursor:pointer;transition:all .2s;background:rgba(255,255,255,.02)}
.disc-card:hover{border-color:rgba(139,92,246,.35);background:rgba(139,92,246,.05)}
.tag{display:inline-block;padding:2px 8px;border-radius:100px;font-size:10px;font-family:'Cinzel',serif}

/* Header */
.header{padding:14px 16px 12px;background:rgba(8,8,20,.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(139,92,246,.15);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header-title{font-family:'Cinzel Decorative',serif;font-size:15px;background:linear-gradient(135deg,#a78bfa,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header-sub{color:rgba(167,139,250,.55);font-size:10px;font-family:'Cinzel',serif;margin-top:2px}
.pts-badge{background:rgba(139,92,246,.13);border:1px solid rgba(139,92,246,.3);border-radius:10px;padding:6px 12px;display:flex;align-items:center;gap:5px}
.pts-num{color:#a78bfa;font-family:'Cinzel',serif;font-weight:700;font-size:15px}

/* Tab bar (已修改為 relative 避免遮擋) */
.tabbar{padding:6px 4px;padding-bottom:calc(6px + env(safe-area-inset-bottom,12px));background:rgba(6,6,16,.96);backdrop-filter:blur(20px);border-top:1px solid rgba(139,92,246,.18);display:flex;justify-content:space-around;position:relative;z-index:100;flex-shrink:0;gap:2px}
.tab{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px;border-radius:10px;cursor:pointer;transition:all .2s;color:rgba(226,232,240,.4);border:1px solid transparent;flex:1}
.tab.on{color:#a78bfa;background:rgba(139,92,246,.15);border-color:rgba(139,92,246,.3)}
.tab-icon{font-size:18px;line-height:1}
.tab-label{font-size:9px;font-family:'Cinzel',serif}

/* Content (已修改 padding 配合相對定位的 tabbar) */
.content{flex:1;overflow-y:auto;padding:16px 14px 20px;-webkit-overflow-scrolling:touch}
.section-title{font-family:'Cinzel',serif;font-size:17px;letter-spacing:1px;margin-bottom:4px}
.section-sub{color:rgba(226,232,240,.45);font-size:12px;margin-bottom:16px}
.sec-label{font-family:'Cinzel',serif;color:#a78bfa;font-size:12px;letter-spacing:1px;margin-bottom:8px}
.grad-text{background:linear-gradient(135deg,#a78bfa,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* Modal */
.modal-bg{position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .25s ease}
.modal{background:rgba(6,6,18,.97);border:1px solid rgba(139,92,246,.4);border-radius:18px;padding:24px;max-width:340px;width:100%;text-align:center;box-shadow:0 0 60px rgba(139,92,246,.2)}

/* Login ring */
.ring{position:absolute;border-radius:50%;border:1px solid rgba(139,92,246,.12);animation:spin 8s linear infinite;pointer-events:none}

/* Notification */
.notif{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,rgba(124,58,237,.95),rgba(8,145,178,.95));color:#fff;padding:11px 22px;border-radius:100px;font-size:12px;z-index:9999;backdrop-filter:blur(12px);max-width:90vw;text-align:center;animation:fadeIn .3s ease;white-space:nowrap}

/* Filter pills */
.filter-bar{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.fpill{padding:5px 12px;border-radius:100px;font-size:11px;font-family:'Cinzel',serif;cursor:pointer;border:1px solid;transition:all .2s;white-space:nowrap;flex-shrink:0}

/* Spin ring for points */
.spin-ring{animation:spin 8s linear infinite;width:110px;height:110px;border-radius:50%;padding:3px;background:conic-gradient(from 0deg,#7c3aed,#0891b2,#a78bfa,#7c3aed);flex-shrink:0}
.spin-ring-inner{width:100%;height:100%;border-radius:50%;background:#0d0d1a;display:flex;align-items:center;justify-content:center;font-size:30px}

/* Upload preview */
.preview-img{width:100%;max-height:280px;border-radius:10px;object-fit:contain;background:rgba(0,0,0,.3);display:block;margin-bottom:10px}

/* Canvas */
#draw-canvas{border:2px solid rgba(139,92,246,.3);border-radius:10px;width:100%;touch-action:none;display:block;cursor:crosshair;background:#0d0d1a}

/* Color swatches */
.swatch{width:32px;height:32px;border-radius:6px;cursor:pointer;border:1px solid rgba(255,255,255,.2);flex-shrink:0;transition:transform .1s}
.swatch.active{border:2px solid #fff;transform:scale(1.1)}

::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(139,92,246,.35);border-radius:2px}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══ 玄秘紀元 - 純 Vanilla JS 版 ═══
const STORE_KEY = 'arcane_v4';

// ── 資料 ──
function defaultData() {
  return {
    points:0, uploads:[], purchased:[], currentTitle:null,
    drawings:[], posts:[], todayDrawPts:0, lastDrawDate:null,
    lastCheckIn:null, loginCount:0, joinDate:null,
    customName:null, isFirstLogin:true,
    dailyUploads:{magic:0,creature:0,place:0}, lastUploadDate:null
  };
}

function loadData(role) {
  try {
    const raw = localStorage.getItem(STORE_KEY+'_'+role);
    if (raw) {
      const d = JSON.parse(raw);
      const today = new Date().toDateString();
      if (d.lastDrawDate !== today) { d.todayDrawPts=0; d.lastDrawDate=today; }
      if (d.lastUploadDate !== today) { d.dailyUploads={magic:0,creature:0,place:0}; d.lastUploadDate=today; }
      return Object.assign(defaultData(), d);
    }
  } catch(e) {}
  return Object.assign(defaultData(), {joinDate:new Date().toLocaleDateString('zh-TW'), lastDrawDate:new Date().toDateString(), lastUploadDate:new Date().toDateString()});
}

function saveData(role, data) {
  try { localStorage.setItem(STORE_KEY+'_'+role, JSON.stringify(data)); } catch(e) {}
}

// ── 占卜 ──
function getMoonPhase() {
  const known = new Date(2000,0,6,18,14);
  const phase = ((((Date.now()-known.getTime())/86400000)%29.53)+29.53)%29.53;
  const phases = [
    {name:'新月',symbol:'🌑',modifier:1.1},
    {name:'眉月',symbol:'🌒',modifier:0.95},
    {name:'上弦月',symbol:'🌓',modifier:1.0},
    {name:'盈凸月',symbol:'🌔',modifier:1.05},
    {name:'滿月',symbol:'🌕',modifier:1.3},
    {name:'虧凸月',symbol:'🌖',modifier:1.0},
    {name:'下弦月',symbol:'🌗',modifier:0.9},
    {name:'殘月',symbol:'🌘',modifier:0.85}
  ];
  const idx = Math.floor(phase/3.69);
  return phases[Math.min(idx,7)];
}

function getTimeEnergy() {
  const h = new Date().getHours();
  const times = [
    [23,1,'子時',1.3],[1,3,'丑時',1.2],[3,5,'寅時',1.15],[5,7,'卯時',0.9],
    [7,9,'辰時',0.8],[9,11,'巳時',0.7],[11,13,'午時',0.6],[13,15,'未時',0.75],
    [15,17,'申時',0.85],[17,19,'酉時',1.0],[19,21,'戌時',1.1],[21,23,'亥時',1.2]
  ];
  for (const [s,e,name,mod] of times) {
    if (h>=s||h<e||((s>e)&&(h>=s||h<e))) return {name,modifier:mod};
    if (h>=s&&h<e) return {name,modifier:mod};
  }
  return {name:'子時',modifier:1.3};
}

function divineCalc(name, q, seed) {
  const moon = getMoonPhase();
  const time = getTimeEnergy();
  const c = name+'夏娃'+q+seed+moon.name+time.name;
  let h=0;
  for(let i=0;i<c.length;i++){h=((h<<5)-h)+c.charCodeAt(i);h=h&h;}
  const a=Math.abs(h);
  let p1 = Math.round(((a%40)+30)*moon.modifier*time.modifier);
  p1 = Math.min(Math.max(p1,15),85);
  const p2 = Math.min(Math.round(((a>>8)%35)+15), 100-p1-5);
  return {p1, p2, p3:100-p1-p2, moon, time};
}

const OUTCOMES = {
  magic:{1:'靈界強烈回應！術法順利施展，靈力完美融合。',2:'效果中等，遭遇輕微阻力，需更多修為。',3:'術法施展困難，靈力散亂，建議另尋時機。'},
  creature:{1:'靈體強烈回應！成功拍到神秘生物，獲得靈異證據。',2:'靈體反應模糊，可能為弱靈，需加倍警覺。',3:'此地暫無明顯靈異現象。'},
  place:{1:'靈界認可！此處蘊含豐富靈力，探尋獲得深刻體驗。',2:'靈力複雜，存在多層次靈異，需謹慎探索。',3:'靈界沈默，此地靈力被隱蔽封鎖。'}
};

// ── 商店資料 ──
const SHOP = [
  {id:8,name:'金內練術',cost:100,icon:'⚙️',desc:'修煉金屬元素之力',type:'magic'},
  {id:9,name:'木內練術',cost:100,icon:'🌿',desc:'感應自然生命之力',type:'magic'},
  {id:10,name:'水內練術',cost:100,icon:'💧',desc:'掌控流動變化之力',type:'magic'},
  {id:11,name:'雷內練術',cost:100,icon:'⚡',desc:'駕馭天雷霹靂之力',type:'magic'},
  {id:12,name:'白魔法',cost:100,icon:'🕊️',desc:'淨化治癒的光明術法',type:'magic'},
  {id:13,name:'黑魔法',cost:100,icon:'☽',desc:'汲取黑暗力量的禁斷術法',type:'magic'},
  {id:16,name:'古老的紗草紙魔法',cost:150,icon:'📜',desc:'來自埃及與希臘的古老秘術',type:'magic'},
  {id:17,name:'自然魔法',cost:100,icon:'🌳',desc:'連結大地與精靈的魔法',type:'magic'},
  {id:18,name:'式神召喚',cost:1000,icon:'🦊',desc:'陰陽道役使的靈體',type:'summon'},
  {id:19,name:'天使召喚',cost:1000,icon:'👼',desc:'呼喚神聖界域的使者',type:'summon'},
  {id:20,name:'惡魔召喚',cost:1000,icon:'👿',desc:'與深淵存在締結契約',type:'summon'},
  {id:14,name:'魔法觀認知',cost:200,icon:'📜',desc:'基礎魔法圓陣繪製技巧',type:'item'},
  {id:26,name:'魔藥學',cost:250,icon:'🧪',desc:'探索神秘藥劑的調配奧義',type:'item'},
  {id:1,name:'尋靈者',cost:500,icon:'👁️',desc:'踏入靈界的初學者',type:'title'},
  {id:2,name:'定靈師',cost:1000,icon:'🕯️',desc:'能感知並定位靈體的術士',type:'title'},
  {id:3,name:'靈界行者',cost:2000,icon:'🌀',desc:'自由穿梭於靈界與現世之間',type:'title'},
  {id:4,name:'黑魔法師',cost:1000,icon:'🌑',desc:'掌握黑暗之力者',type:'title'},
  {id:5,name:'龍裔獵人',cost:1500,icon:'🐉',desc:'追蹤神龍的傳奇獵手',type:'title'},
  {id:6,name:'符文學者',cost:1200,icon:'🔮',desc:'精通古老符文之術',type:'title'},
  {id:7,name:'星辰使者',cost:1800,icon:'⭐',desc:'受星辰指引的旅者',type:'title'},
];

const DAILY_LIMITS = {magic:3, creature:2, place:1};
const MAGIC_TYPES = ['白魔法','黑魔法','自然魔法','古老的紗草紙魔法','一般魔法'];

// ── 全域狀態 ──
let state = {
  stage: localStorage.getItem('arcane_session') ? 'main' : 'login',
  role: localStorage.getItem('arcane_session') || null,
  data: null,
  tab: 'upload',
  notifTimer: null,
  drawColor: '#a78bfa',
  drawSize: 4,
  drawMode: 'draw',
  isDrawing: false
};

if (state.role) {
  state.data = loadData(state.role);
  if (!state.data.customName) state.stage = 'name';
}

// ── 工具 ──
function $(id){ return document.getElementById(id); }
function q(sel){ return document.querySelector(sel); }
function E(tag, attrs={}, ...children) {
  const el = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)) {
    if (k === 'class') el.className = v;
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else if (k === 'html') el.innerHTML = v;
    else el.setAttribute(k, v);
  }
  for (const c of children) {
    if (c == null) continue;
    el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return el;
}

function showNotif(msg) {
  const el = $('notif');
  el.textContent = msg;
  el.style.display = 'block';
  if (state.notifTimer) clearTimeout(state.notifTimer);
  state.notifTimer = setTimeout(() => el.style.display='none', 2500);
}

function updateData(updater) {
  const prev = state.data;
  state.data = typeof updater === 'function' ? updater(prev) : Object.assign({}, prev, updater);
  saveData(state.role, state.data);
  render();
}

// ── 背景特效 ──
function initBg() {
  const bg = $('bg');
  // 星星
  for (let i=0; i<60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;width:${Math.random()<0.2?2:1}px;height:${Math.random()<0.2?2:1}px;background:${['#a78bfa','#22d3ee','#fbbf24'][i%3]};--d:${3+Math.random()*4}s;--delay:${Math.random()*4}s`;
    bg.appendChild(s);
  }
  // 粒子
  for (let i=0; i<15; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 2+Math.random()*3;
    p.style.cssText = `left:${Math.random()*100}%;bottom:0;width:${size}px;height:${size}px;--d:${6+Math.random()*8}s;--delay:${Math.random()*8}s`;
    bg.appendChild(p);
  }
}

// ── 渲染 ──
function render() {
  const app = $('app-content');
  if (!app) return;
  app.innerHTML = '';
  
  if (state.stage === 'login') { app.appendChild(renderLogin()); return; }
  if (state.stage === 'name')  { app.appendChild(renderNameModal()); return; }
  if (state.stage === 'main')  { app.appendChild(renderMain()); return; }
}

// ── 登入頁 ──
function renderLogin() {
  let u='', p='';
  const wrap = E('div', {style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'20px',position:'relative'}});
  
  // 旋轉環
  const r1 = E('div', {class:'ring', style:{width:'360px',height:'360px',top:'50%',left:'50%',marginLeft:'-180px',marginTop:'-180px'}});
  wrap.appendChild(r1);
  
  const box = E('div', {class:'fade-in', style:{width:'100%',maxWidth:'380px',position:'relative',zIndex:10}});
  box.innerHTML = `
    <div style="text-align:center;margin-bottom:28px">
      <div style="font-size:56px;margin-bottom:10px">🔮</div>
      <h1 class="header-title" style="font-size:24px;font-weight:900;letter-spacing:2px">玄秘紀元</h1>
      <p style="color:rgba(167,139,250,.6);font-family:'Cinzel',serif;font-size:10px;letter-spacing:4px;margin-top:6px">ARCANE CHRONICLES</p>
    </div>
    <div style="background:rgba(8,8,20,.85);backdrop-filter:blur(20px);border:1px solid rgba(139,92,246,.3);border-radius:20px;padding:28px 24px">
      <div style="margin-bottom:16px">
        <label style="display:block;color:rgba(167,139,250,.8);font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;margin-bottom:6px">帳號</label>
        <input id="l-user" type="text" placeholder="輸入帳號...">
      </div>
      <div style="margin-bottom:22px">
        <label style="display:block;color:rgba(167,139,250,.8);font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;margin-bottom:6px">密碼</label>
        <input id="l-pass" type="password" placeholder="輸入密碼...">
      </div>
      <button class="btn" id="login-btn">登入</button>
      <p style="text-align:center;margin-top:12px;color:rgba(167,139,250,.35);font-size:10px;font-family:'Cinzel',serif">管理員/武者 或 @@/##</p>
    </div>
  `;
  
  wrap.appendChild(box);
  
  setTimeout(() => {
    const btn = $('login-btn');
    if (btn) btn.onclick = doLogin;
    ['l-user','l-pass'].forEach(id => {
      const el = $(id);
      if (el) el.onkeydown = e => { if(e.key==='Enter') doLogin(); };
    });
  }, 0);
  
  return wrap;
}

function doLogin() {
  const u = ($('l-user')||{}).value||'';
  const p = ($('l-pass')||{}).value||'';
  if (!u||!p) { showNotif('請輸入帳號和密碼'); return; }
  let r = null;
  if (u==='管理員'&&p==='武者') r='admin';
  else if (u==='@@'&&p==='##') r='user';
  else { showNotif('帳號或密碼錯誤'); return; }
  
  state.role = r;
  localStorage.setItem('arcane_session', r);
  state.data = loadData(r);
  state.data.loginCount = (state.data.loginCount||0)+1;
  saveData(r, state.data);
  
  if (!state.data.customName) {
    state.stage = 'name';
  } else {
    state.stage = 'main';
  }
  render();
}

const TABS = [

  {id:'points',icon:'💎',label:'點數'},
  {id:'shop',icon:'🛍️',label:'商店'},

function renderMain() {
  const d = state.data;
  const allItems = SHOP.concat(getAutoTitles(d));
  const cur = d.currentTitle ? allItems.find(s=>s.id===d.currentTitle) : null;
  const displayName = d.customName || (state.role==='admin'?'管理員':'見習術士');
  
  const wrap = E('div', {class:'fade-in', style:{display:'contents'}});
  
  // Header
  const hdr = E('div', {class:'header'});
  hdr.innerHTML = `
    <div>
      <div class="header-title">玄秘紀元</div>

    </div>
    <div class="pts-badge">
      <span style="font-size:13px">💎</span>
      <span class="pts-num">${d.points.toLocaleString()}</span>
    </div>
  `;
  wrap.appendChild(hdr);
  
  // Content
  const content = E('div', {class:'content', id:'tab-content'});
  renderTab(content);
  wrap.appendChild(content);
  
  // Tabbar
  const bar = E('div', {class:'tabbar'});
  TABS.forEach(t => {
    const tab = E('div', {class:'tab'+(state.tab===t.id?' on':'')});
    tab.innerHTML = `<span class="tab-icon">${t.icon}</span><span class="tab-label">${t.label}</span>`;
    tab.onclick = () => { state.tab = t.id; renderTabContent(); };
    bar.appendChild(tab);
  });
  wrap.appendChild(bar);
  
  return wrap;
}

function renderTabContent() {
  const content = $('tab-content');
  if (!content) return;
  // Update tabbar active state
  document.querySelectorAll('.tab').forEach((el,i) => {
    el.className = 'tab' + (TABS[i].id === state.tab ? ' on' : '');
  });
  content.innerHTML = '';
  renderTab(content);
  content.scrollTop = 0;
}

function renderTab(container) {
  switch(state.tab) {
    case 'upload':  container.appendChild(renderUpload());  break;
    case 'points':  container.appendChild(renderPoints());  break;
    case 'shop':    container.appendChild(renderShop());    break;
    case 'records': container.appendChild(renderRecords()); break;
    case 'discuss': container.appendChild(renderDiscuss()); break;
    case 'draw':    container.appendChild(renderDraw());    break;
    case 'profile': container.appendChild(renderProfile()); break;
  }
}

function handlePhotoSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 10*1024*1024) { showNotif('圖片過大（限10MB）'); return; }
  const reader = new FileReader();
  reader.onload = ev => { uploadState.preview = ev.target.result; renderTabContent(); };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function doUpload() {
  if (!uploadState.sel || !uploadState.preview) return;
  const DAILY = state.data.dailyUploads || {magic:0,creature:0,place:0};
  const used = DAILY[uploadState.sel]||0;
  if (used >= DAILY_LIMITS[uploadState.sel]) {
    const nameMap={magic:'魔法道法',creature:'神秘生物',place:'神秘地點'};
    showNotif(`今日「${nameMap[uploadState.sel]}」已達上限`);
    return;
  }
  
  uploadState.uploading = true;
  renderTabContent();
  
  const labelMap = {magic:uploadState.magic, creature:'靈體探查', place:'靈地探尋'};
  const qMap = {magic:'魔法是否成功',creature:'是否拍到生物',place:'是否探到靈地'+(uploadState.location?'+'+uploadState.location:'')};
  const userName = state.data.customName || '術士';
  
  setTimeout(() => {
    const {p1,p2,p3,moon,time} = divineCalc(userName, qMap[uploadState.sel], Date.now()+'');
    const isSuccess = p1 >= 50;
    
    // 嚴格限制：驗證沒有通過，點數就是 0
    const pts = isSuccess ? (uploadState.sel==='place'?20:uploadState.sel==='creature'?15:10) : 0;
    const sel = uploadState.sel;
    
    uploadState.result = {
      type:sel, label:labelMap[sel], p1, p2, p3, moon, time,
      location:uploadState.location, isSuccess
    };
    uploadState.uploading = false;
    
    const newUpload = {
      id:Date.now(), type:sel,
      subType:sel==='magic'?uploadState.magic:null,
      label:labelMap[sel], location:uploadState.location||null,
      preview:uploadState.preview, points:pts, note:uploadState.note,
      verifiedSuccess:isSuccess,
      isSuccess, time:new Date().toLocaleString('zh-TW'), timestamp:Date.now(),
      result:{p1,p2,p3}
    };
    
    updateData(d => ({
      ...d,
      uploads:[newUpload,...d.uploads],
      points:d.points+pts,
      dailyUploads:{...(d.dailyUploads||{magic:0,creature:0,place:0}),
        [sel]:isSuccess?(d.dailyUploads?.[sel]||0)+1:(d.dailyUploads?.[sel]||0)},
      lastUploadDate:new Date().toDateString()
    }));
    
    showNotif(isSuccess ? '靈界認可！+' + pts + ' 點' : '占卜未通過，未獲得點數');
  }, 1800);
}

  eraser.style.cssText = `padding:6px 12px;height:32px;border-radius:6px;background:rgba(139,92,246,.2);color:${state.drawMode==='erase'?'#fff':'rgba(226,232,240,.7)'};border:${state.drawMode==='erase'?'2px solid #fff':'1px solid rgba(255,255,255,.15)'};cursor:pointer;font-size:12px`;
  eraser.textContent = '橡皮擦';
  eraser.onclick = () => { state.drawMode = state.drawMode==='erase'?'draw':'erase'; renderTabContent(); };
  colorRow.appendChild(eraser);
  wrap.appendChild(colorRow);
  
  // 筆刷大小
  const sizeRow = E('div',{style:{display:'flex',alignItems:'center',gap:'10px',marginBottom:'10px'}});
  sizeRow.innerHTML = `<span style="color:rgba(226,232,240,.6);font-family:'Cinzel',serif;font-size:11px;white-space:nowrap">大小</span>`;
  const sizeSlider = E('input',{type:'range',min:'1',max:'40',value:state.drawSize,style:{flex:'1'}});
  const sizeLabel = E('span',{style:{color:'#a78bfa',font:'11px/1 Cinzel,serif',minWidth:'32px'}},state.drawSize+'px');
  sizeSlider.oninput = () => { state.drawSize=parseInt(sizeSlider.value); sizeLabel.textContent=state.drawSize+'px'; };
  sizeRow.appendChild(sizeSlider);
  sizeRow.appendChild(sizeLabel);
  wrap.appendChild(sizeRow);
  
  // Canvas
  const canvas = E('canvas',{id:'draw-canvas',width:'800',height:'500'});
  wrap.appendChild(canvas);
  
  // 按鈕列
  const btnRow = E('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'8px',margin:'12px 0 14px'}});
  const clearBtn = E('button',{class:'btn btn-muted btn-sm'},'🗑️ 清除');
  const dlBtn = E('button',{class:'btn btn-muted btn-sm'},'💾 下載');
  const submitBtn = E('button',{class:'btn btn-sm'},'📤 提交');
  submitBtn.disabled = d.todayDrawPts >= 5;
  if (d.todayDrawPts >= 5) submitBtn.textContent = '✓ 已滿';
  clearBtn.onclick = () => { const ctx=canvas.getContext('2d'); ctx.fillStyle='#0d0d1a'; ctx.fillRect(0,0,800,500); showNotif('已清除'); };
  dlBtn.onclick = () => { const a=document.createElement('a'); a.href=canvas.toDataURL(); a.download='魔法符陣.png'; a.click(); showNotif('已下載'); };
  submitBtn.onclick = () => {
    const pts = d.todayDrawPts < 5 ? 5 : 0;
    const typeSel = $('draw-type-sel');
    const subType = typeSel ? typeSel.value : '一般魔法陣';
    const img = canvas.toDataURL();
    updateData(prev=>({...prev,
      drawings:[{id:Date.now(),image:img,subType,time:new Date().toLocaleDateString('zh-TW'),timestamp:Date.now()},...prev.drawings],
      todayDrawPts:prev.todayDrawPts+pts, points:prev.points+pts,
      lastDrawDate:new Date().toDateString()
    }));
    showNotif(pts>0?'繪符提交！+'+pts+' 點':'繪符紀錄已保存');
    const ctx=canvas.getContext('2d'); ctx.fillStyle='#0d0d1a'; ctx.fillRect(0,0,800,500);
  };
  btnRow.appendChild(clearBtn); btnRow.appendChild(dlBtn); btnRow.appendChild(submitBtn);
  wrap.appendChild(btnRow);
  
  // 作品集
  if (d.drawings.length>0) {
    const gallDiv = E('div');
    gallDiv.innerHTML = `<p class="sec-label">✦ 作品集（${d.drawings.length}幅）</p>`;
    const gallGrid = E('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'6px'}});
    d.drawings.slice(0,12).forEach(dw => {
      const img = E('img',{src:dw.image,style:{width:'100%',aspectRatio:'1.6',objectFit:'cover',borderRadius:'8px',border:'1px solid rgba(139,92,246,.2)'}});
      gallGrid.appendChild(img);
    });
    gallDiv.appendChild(gallGrid);
    wrap.appendChild(gallDiv);
  }
  
  // 初始化 canvas
  setTimeout(() => {
    const c = $('draw-canvas');
    if (!c) return;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#0d0d1a';
    ctx.fillRect(0,0,800,500);
    
    let drawing = false;
    const getPos = e => {
      const rect = c.getBoundingClientRect();
      const scX = c.width/rect.width, scY = c.height/rect.height;
      const clientX = e.clientX || e.touches?.[0]?.clientX;
      const clientY = e.clientY || e.touches?.[0]?.clientY;
      return {x:(clientX-rect.left)*scX, y:(clientY-rect.top)*scY};
    };
    const start = e => { e.preventDefault(); const {x,y}=getPos(e); ctx.beginPath(); ctx.moveTo(x,y); drawing=true; };
    const move = e => { if(!drawing) return; e.preventDefault(); const {x,y}=getPos(e); ctx.lineWidth=state.drawSize; ctx.lineCap='round'; ctx.strokeStyle=state.drawMode==='erase'?'#0d0d1a':state.drawColor; ctx.lineTo(x,y); ctx.stroke(); };
    const end = () => drawing=false;
    c.addEventListener('mousedown',start); c.addEventListener('mousemove',move); c.addEventListener('mouseup',end); c.addEventListener('mouseleave',end);
    c.addEventListener('touchstart',start,{passive:false}); c.addEventListener('touchmove',move,{passive:false}); c.addEventListener('touchend',end);
  }, 50);
  
  return wrap;
}

// ── 個人檔案 Tab ──
function getAutoTitles(data) {
  const n = data.uploads.filter(u=>u.type==='place'&&u.verifiedSuccess).length;
  const out = [];
  if(n>=10) out.push({id:'auto_1',name:'探靈者',icon:'👁️',desc:'已驗證探靈成功10次',type:'title'});
  if(n>=50) out.push({id:'auto_2',name:'尋靈者',icon:'🕯️',desc:'已驗證探靈成功50次',type:'title'});
  if(n>=100) out.push({id:'auto_3',name:'靈界行者',icon:'🌀',desc:'已驗證探靈成功100次',type:'title'});
  return out;
}

function renderProfile() {
  const d = state.data;
  const autoTitles = getAutoTitles(d);
  const allItems = SHOP.concat(autoTitles);
  const ownedTitles = SHOP.filter(i=>d.purchased.includes(i.id)&&i.type==='title').concat(autoTitles);
  const cur = d.currentTitle ? allItems.find(s=>s.id===d.currentTitle) : null;
  const level = Math.floor(d.points/250)+1;
  const displayName = d.customName||(state.role==='admin'?'管理員':'見習術士');
  const magicMap={};
  d.purchased.forEach(id=>{ const it=SHOP.find(i=>i.id===id&&i.type==='magic'); if(it) magicMap[it.name]=(magicMap[it.name]||0)+1; });
  const otherOwned = SHOP.filter(i=>d.purchased.includes(i.id)&&i.type!=='title'&&i.type!=='magic');
  
  const wrap = E('div',{class:'fade-in'});
  wrap.innerHTML = `<h2 class="section-title" style="margin-bottom:18px">個人檔案</h2>`;
  
  // 主卡片
  wrap.innerHTML += `
    <div class="card" style="background:rgba(139,92,246,.08);margin-bottom:12px;text-align:center;padding:20px">
      <div style="font-size:44px;margin-bottom:10px">${state.role==='admin'?'⚔️':'🧙'}</div>
      <h3 class="grad-text" style="font-family:'Cinzel Decorative',serif;font-size:19px;margin-bottom:4px">${displayName}</h3>
      <p style="color:rgba(226,232,240,.6);font-family:'Cinzel',serif;font-size:12px;margin-bottom:16px">${cur?cur.icon+' '+cur.name:'見習魔法師'}</p>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
        <div><p style="color:#a78bfa;font-size:9px;font-family:'Cinzel',serif;margin-bottom:2px">等級</p><p style="font-size:15px;font-weight:700">Lv.${level}</p></div>
        <div><p style="color:#a78bfa;font-size:9px;font-family:'Cinzel',serif;margin-bottom:2px">點數</p><p style="font-size:15px;font-weight:700">${d.points}</p></div>
        <div><p style="color:#a78bfa;font-size:9px;font-family:'Cinzel',serif;margin-bottom:2px">稱號</p><p style="font-size:15px;font-weight:700">${ownedTitles.length}</p></div>
      </div>
    </div>
  `;
  
  // 名稱設定
  const nameCard = E('div',{class:'card',style:{marginBottom:'10px'}});
  nameCard.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><p class="sec-label" style="margin-bottom:0">✦ 術士名號</p></div><p style="font-size:13px;color:#e2e8f0">${displayName}</p>`;
  const nameBtn = E('button',{style:{background:'rgba(139,92,246,.2)',border:'1px solid rgba(139,92,246,.3)',color:'#a78bfa',padding:'4px 10px',borderRadius:'6px',fontSize:'10px',cursor:'pointer'}},'更改');
  nameBtn.onclick = () => showNameChangeModal();
  nameCard.querySelector('div').appendChild(nameBtn);
  wrap.appendChild(nameCard);
  
  // 稱號
  const titleCard = E('div',{class:'card',style:{marginBottom:'10px'}});
  titleCard.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <p class="sec-label" style="margin-bottom:0">✦ 當前稱號</p>
    </div>
    ${cur?`<div style="display:flex;gap:10px;align-items:center;padding:10px;background:rgba(139,92,246,.08);border-radius:8px"><span style="font-size:22px">${cur.icon}</span><div><p style="color:#a78bfa;font-size:13px;font-weight:600">${cur.name}</p><p style="color:rgba(226,232,240,.4);font-size:10px">${cur.desc}</p></div></div>`:'<p style="font-size:12px;color:rgba(226,232,240,.4);padding:8px 0">未配戴稱號</p>'}
  `;
  const switchBtn = E('button',{style:{background:'rgba(139,92,246,.2)',border:'1px solid rgba(139,92,246,.3)',color:'#a78bfa',padding:'4px 10px',borderRadius:'6px',fontSize:'10px',cursor:'pointer'}},'切換');
  switchBtn.onclick = () => showTitleModal(ownedTitles, d.currentTitle);
  titleCard.querySelector('div').appendChild(switchBtn);
  wrap.appendChild(titleCard);
  
  // 已學魔法
  if (Object.keys(magicMap).length>0) {
    const mc = E('div',{class:'card',style:{marginBottom:'10px'}});
    mc.innerHTML = `<p class="sec-label">✦ 已學魔法</p><div style="display:flex;gap:6px;flex-wrap:wrap">${Object.entries(magicMap).map(([n,c])=>`<span class="tag" style="background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.25);color:#a78bfa;padding:4px 10px">${n}${c>1?' ×'+c:''}</span>`).join('')}</div>`;
    wrap.appendChild(mc);
  }
  
  // 已解鎖
  if (otherOwned.length>0) {
    const oc = E('div',{class:'card',style:{marginBottom:'10px'}});
    oc.innerHTML = `<p class="sec-label">✦ 已解鎖技能</p><div style="display:flex;gap:6px;flex-wrap:wrap">${otherOwned.map(i=>`<span class="tag" style="background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.25);color:#a78bfa">${i.icon} ${i.name}</span>`).join('')}</div>`;
    wrap.appendChild(oc);
  }
  
  // 帳號資訊
  const ac = E('div',{class:'card',style:{marginBottom:'12px',fontSize:'12px'}});
  ac.innerHTML = `
    <p class="sec-label">✦ 帳號資訊</p>
    ${[['帳號',state.role==='admin'?'管理員':'@@'],['身份',state.role==='admin'?'管理員':'一般用戶'],['加入日期',d.joinDate||'—'],['登入次數',d.loginCount],['上傳總數',d.uploads.length],['繪符總數',d.drawings.length]].map(([l,v])=>`<p style="color:rgba(226,232,240,.6);margin-bottom:6px;display:flex;justify-content:space-between"><span>${l}</span><span style="color:#e2e8f0">${v}</span></p>`).join('')}
  `;
  wrap.appendChild(ac);
  
  const logoutBtn = E('button',{class:'btn btn-muted',style:{marginBottom:'8px'}},'🚪 登出');
  logoutBtn.onclick = () => {
    localStorage.removeItem('arcane_session');
    state.role=null; state.data=null; state.stage='login';
    render();
  };
  const resetBtn = E('button',{class:'btn btn-danger'},'⚠️ 重置所有數據');
  resetBtn.onclick = () => {
    if (!confirm('確定重置？此操作無法復原！')) return;
    updateData(Object.assign(defaultData(),{joinDate:new Date().toLocaleDateString('zh-TW'),lastDrawDate:new Date().toDateString()}));
    showNotif('已重置');
  };
  wrap.appendChild(logoutBtn);
  wrap.appendChild(resetBtn);
  return wrap;
}

function showNameChangeModal() {
  const existing = $('name-modal');
  if(existing) existing.remove();
  const modal = E('div',{class:'modal-bg',id:'name-modal'});
  modal.innerHTML = `<div class="modal"><h3 style="font-size:15px;color:#a78bfa;margin-bottom:14px">更改術士名號</h3><input id="new-name-inp" type="text" placeholder="輸入新名號（最多12字）" maxlength="12" style="margin-bottom:14px"><div style="display:flex;gap:8px"><button class="btn btn-sm" id="name-ok" style="flex:1">確定</button><button class="btn btn-muted btn-sm" id="name-cancel" style="flex:1">取消</button></div></div>`;
  document.body.appendChild(modal);
  $('name-cancel').onclick = () => modal.remove();
  modal.onclick = e => { if(e.target===modal) modal.remove(); };
  $('name-ok').onclick = () => {
    const val = $('new-name-inp').value.trim();
    if (!val) { showNotif('請輸入名稱'); return; }
    updateData(d=>({...d,customName:val}));
    modal.remove();
    showNotif('名稱已更改！');
  };
}

function showTitleModal(titles, currentId) {
  const existing = $('title-modal');
  if(existing) existing.remove();
  const modal = E('div',{class:'modal-bg',id:'title-modal'});
  const list = titles.map(t=>`<div onclick="selectTitle(${typeof t.id==='number'?t.id:'"'+t.id+'"'})" style="padding:10px;background:${currentId===t.id?'rgba(139,92,246,.2)':'rgba(139,92,246,.06)'};border:1px solid ${currentId===t.id?'#a78bfa':'rgba(139,92,246,.2)'};border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:10px;margin-bottom:8px"><span style="font-size:22px">${t.icon}</span><div><p style="color:#a78bfa;font-size:12px;font-weight:600">${t.name}</p><p style="color:rgba(226,232,240,.4);font-size:10px">${t.desc}</p></div>${currentId===t.id?'<span style="color:#34d399;margin-left:auto;font-size:14px">✓</span>':''}</div>`).join('');
  modal.innerHTML = `<div class="modal" style="text-align:left;max-height:80vh;overflow-y:auto"><h3 style="font-size:15px;text-align:center;margin-bottom:14px;color:#a78bfa">選擇配戴稱號</h3>${titles.length===0?'<p style="text-align:center;color:rgba(226,232,240,.4);font-size:12px;padding:20px 0">尚未擁有任何稱號</p>':list}<div style="display:flex;gap:8px;margin-top:8px"><button class="btn btn-muted btn-sm" onclick="clearTitle()" style="flex:1">卸下稱號</button><button class="btn btn-muted btn-sm" id="title-cancel" style="flex:1">取消</button></div></div>`;
  document.body.appendChild(modal);
  $('title-cancel').onclick = () => modal.remove();
  modal.onclick = e => { if(e.target===modal) modal.remove(); };
}

window.selectTitle = function(id) {
  updateData(d=>({...d,currentTitle:id}));
  const m = $('title-modal');
  if(m) m.remove();
  showNotif('稱號已切換');
};
window.clearTitle = function() {
  updateData(d=>({...d,currentTitle:null}));
  const m = $('title-modal');
  if(m) m.remove();
  showNotif('已卸下稱號');
};

// ── 初始化 ──
document.body.innerHTML = `
  <div id="bg" style="position:fixed;inset:0;pointer-events:none;overflow:hidden"></div>
  <div id="notif" class="notif" style="display:none"></div>
  <div id="app-content" style="height:100vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto"></div>
`;

initBg();
render();
</script>
</body>
