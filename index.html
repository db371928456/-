function loadData(role) {
  try {
    const raw = localStorage.getItem(STORAGE_KEY + "_" + role);
    if (raw) {
      const d = JSON.parse(raw);
      const today = new Date().toDateString();
      if (d.lastDrawDate !== today) { d.todayDrawPts = 0; d.lastDrawDate = today; }
      if (d.lastUploadDate !== today) {
        d.dailyUploads = { magic: 0, creature: 0, place: 0 };
        d.lastUploadDate = today;
      }
      return { ...defaultData, ...d };
    }
  } catch(e) {}
  return { ...defaultData, joinDate: new Date().toLocaleDateString('zh-TW'), lastDrawDate: new Date().toDateString(), lastUploadDate: new Date().toDateString() };
}

function saveData(role, data) {
  try { localStorage.setItem(STORAGE_KEY + "_" + role, JSON.stringify(data)); } catch(e) {}
}

function checkReq(req, data) {
  if (!req) return { ok:true, msg:"" };
  if (req.type==="hasItems") {
    const ok = req.items.every(id => data.purchased.includes(id));
    return { ok, msg: ok ? "" : "需先購買金木水雷四象內練術" };
  }
  if (req.type==="magicUse") {
    const count = data.uploads.filter(u=>u.subType===req.target).length;
    return { ok: count>=req.count, msg:`需施展「${req.target}」${req.count}次（目前：${count}次）` };
  }
  if (req.type==="drawUse") {
    const count = data.drawings.filter(d=>d.subType===req.target).length;
    return { ok: count>=req.count, msg:`需繪製「${req.target}」${req.count}次（目前：${count}次）` };
  }
  return { ok:true, msg:"" };
}

// ── 月相計算 ──
function getMoonPhase() {
  const known = new Date(2000, 0, 6, 18, 14); // 已知新月
  const diff = (Date.now() - known.getTime()) / (1000*60*60*24);
  const phase = ((diff % 29.53) + 29.53) % 29.53;
  if (phase < 1.85)  return { name:"新月",  symbol:"🌑", energy:"起始", modifier:1.1 };
  if (phase < 7.38)  return { name:"眉月",  symbol:"🌒", energy:"成長", modifier:0.95 };
  if (phase < 9.22)  return { name:"上弦月",symbol:"🌓", energy:"行動", modifier:1.0 };
  if (phase < 14.77) return { name:"盈凸月",symbol:"🌔", energy:"積累", modifier:1.05 };
  if (phase < 16.61) return { name:"滿月",  symbol:"🌕", energy:"巔峰", modifier:1.3 };
  if (phase < 22.15) return { name:"虧凸月",symbol:"🌖", energy:"釋放", modifier:1.0 };
  if (phase < 23.99) return { name:"下弦月",symbol:"🌗", energy:"回歸", modifier:0.9 };
  return                     { name:"殘月",  symbol:"🌘", energy:"沉澱", modifier:0.85 };
}

// ── 時辰計算 ──
function getTimeEnergy() {
  const h = new Date().getHours();
  if (h >= 23 || h < 1)  return { name:"子時", desc:"陰陽交替，靈力最盛", modifier:1.3 };
  if (h >= 1  && h < 3)  return { name:"丑時", desc:"靈界通道開啟",       modifier:1.2 };
  if (h >= 3  && h < 5)  return { name:"寅時", desc:"幽冥氣息濃厚",       modifier:1.15 };
  if (h >= 5  && h < 7)  return { name:"卯時", desc:"天光初現，靈力平穩", modifier:0.9 };
  if (h >= 7  && h < 9)  return { name:"辰時", desc:"陽氣上升",           modifier:0.8 };
  if (h >= 9  && h < 11) return { name:"巳時", desc:"陽氣旺盛，靈力較弱", modifier:0.7 };
  if (h >= 11 && h < 13) return { name:"午時", desc:"陽極，靈力最弱",     modifier:0.6 };
  if (h >= 13 && h < 15) return { name:"未時", desc:"陽氣漸收",           modifier:0.75 };
  if (h >= 15 && h < 17) return { name:"申時", desc:"靈力緩緩回升",       modifier:0.85 };
  if (h >= 17 && h < 19) return { name:"酉時", desc:"黃昏靈力甦醒",       modifier:1.0 };
  if (h >= 19 && h < 21) return { name:"戌時", desc:"靈體活躍時分",       modifier:1.1 };
  return                         { name:"亥時", desc:"靈界完全甦醒",       modifier:1.2 };
}

function divineCalc(name, q, seed) {
  const moon = getMoonPhase();
  const time = getTimeEnergy();
  // 月相+時辰納入計算
  const c = name+"夏娃"+q+seed+moon.name+time.name; let h=0;
  for(let i=0;i<c.length;i++){h=((h<<5)-h)+c.charCodeAt(i);h=h&h;}
  const a=Math.abs(h);
  // 月相修正係數影響成功率
  let p1 = Math.round(((a%40)+30) * moon.modifier * time.modifier);
  p1 = Math.min(Math.max(p1, 15), 80); // 限制在 15~80 之間
  const p2 = Math.round(((a>>8)%35)+15);
  const p3 = 100-p1-Math.min(p2, 100-p1-5);
  return {p1, p2:Math.min(p2,100-p1-5), p3:Math.max(p3,5), moon, time};
}
